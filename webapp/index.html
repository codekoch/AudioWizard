<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audio2Midi -- BPM, MIDI-Clock & Tonart (Webversion)</title>
<!--
  Audio2Midi Webversion: BPM-Erkennung mit stabiler MIDI-Clock und optionaler
  Tonart-Anzeige -- eine eigenstaendige HTML-Datei. Laeuft direkt im Browser
  (Doppelklick / Strg+O) oder ueber GitHub Pages; kein Server noetig.

  Quelle wahlweise Mikrofon/Line-In (getUserMedia) ODER die Wiedergabe
  mithoeren (getDisplayMedia: Tab-/System-Audio -- "Loopback").

  Umsetzung:
    * ScriptProcessorNode statt AudioWorklet. Der Worklet laedt ein Modul,
      was der Browser unter file:// (Origin "null") blockiert. Der
      ScriptProcessor laedt nichts nach und laeuft daher auch lokal. Er ist
      aelter/deprecated, fuer diese leichte Analyse aber voellig ausreichend.
    * MIDI-Clock-Timer im Hauptthread (kein Blob-Worker -- der waere unter
      file:// ebenfalls gesperrt).
    * Tonart-Chroma ueber eine separate groessere FFT (saubere Halbton-
      Aufloesung im Bass/Mittenbereich).

  Voraussetzungen: Chrome/Edge/Opera (Web MIDI). Beim Start fragt der Browser
  nach Mikrofon-Zugriff. Fuer die MIDI-Ausgabe an Software auf demselben
  Rechner einen virtuellen MIDI-Port einrichten (Windows: loopMIDI, macOS:
  IAC-Treiber).

  Autoren: codekoch / claude
-->
<style>
:root {
  --bg: #131210; --surface: #1f1d1a; --surface-hi: #2a2723;
  --fg: #f2efe9; --muted: #8a857c; --accent: #1d9e75; --warn: #f0a53e;
  --bar-bg: #2a2723;
}
* { box-sizing: border-box; }
body {
  margin: 0; min-height: 100vh; background: var(--bg); color: var(--fg);
  font-family: "Segoe UI", Helvetica, Arial, sans-serif;
  display: flex; flex-direction: column;
}
header {
  padding: 14px 24px; border-bottom: 1px solid var(--surface);
  display: flex; align-items: baseline; gap: 12px;
}
header h1 { font-size: 18px; font-weight: 600; margin: 0; }
header .sub { color: var(--muted); font-size: 13px; }
.controls {
  display: flex; flex-wrap: wrap; gap: 16px 20px; align-items: flex-end;
  padding: 16px 24px; border-bottom: 1px solid var(--surface);
}
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.field .row { display: flex; align-items: center; gap: 8px; }
button.ghost {
  background: var(--surface); color: var(--fg); border: 1px solid var(--surface-hi);
  border-radius: 6px; padding: 8px 12px; font-size: 13px; cursor: pointer; white-space: nowrap;
}
button.ghost:hover { background: var(--surface-hi); }
button.ghost:disabled { opacity: .5; cursor: default; }
button.ghost.on { border-color: var(--accent); color: var(--accent); }
select, input[type="number"] {
  background: var(--surface); color: var(--fg); border: 1px solid var(--surface-hi);
  border-radius: 6px; padding: 8px 10px; font-size: 14px;
}
select { min-width: 200px; }
input[type="number"] { width: 72px; }
.range { display: flex; align-items: center; gap: 6px; }
button#startBtn {
  margin-left: auto; background: var(--accent); color: #04342c; border: 0;
  border-radius: 8px; padding: 12px 28px; font-size: 16px; font-weight: 700; cursor: pointer;
}
button#startBtn.stop { background: var(--warn); color: #412402; }
button#startBtn:disabled { opacity: .4; cursor: default; }
.chk { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--fg); cursor: pointer; padding: 7px 0; }
.chk input { accent-color: var(--accent); }
main {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; padding: 24px;
}
.bpm {
  font-size: clamp(96px, 28vw, 280px); font-weight: 700; line-height: 1;
  color: var(--accent); font-variant-numeric: tabular-nums;
}
.bpm.idle { color: var(--muted); opacity: .5; }
.bpm.notes { font-size: clamp(36px, 9vw, 100px); }   /* Noten-Modus: mehrere Namen */
.keyblock { margin-top: 26px; text-align: center; }
.key { font-size: clamp(40px, 9vw, 88px); font-weight: 700; line-height: 1; }
#keyName { color: var(--accent); }
#keyName.idle { color: var(--muted); opacity: .6; }
.par { font-size: .42em; font-weight: 600; color: var(--muted); margin-left: .2em; }
.cap { font-size: 14px; color: var(--muted); letter-spacing: .2em; }
.raw { font-size: 15px; color: var(--muted); margin-top: 12px; }
.status { font-size: 15px; color: var(--muted); margin-top: 2px; min-height: 1.2em; }
.level { width: min(680px, 90%); margin: 22px auto 0; display: flex; align-items: center; gap: 12px; }
.level .lbl { font-size: 12px; color: var(--muted); }
.track { flex: 1; height: 12px; background: var(--bar-bg); border-radius: 6px; overflow: hidden; }
.track > div { height: 100%; width: 0; background: var(--accent); transition: width .08s linear; }
.level .db { font-size: 12px; color: var(--muted); width: 56px; text-align: right; }
.hint { padding: 10px 24px; font-size: 13px; color: var(--muted); border-top: 1px solid var(--surface); min-height: 1.2em; }
.hint.error { color: var(--warn); }
.credit { padding: 4px 24px 10px; font-size: 11px; color: #55544e; text-align: right; }

/* Kompaktere Darstellung auf schmalen Bildschirmen (Handy) */
@media (max-width: 600px) {
  header { flex-direction: column; align-items: flex-start; gap: 1px; padding: 8px 14px; }
  header h1 { font-size: 16px; }
  header .sub { font-size: 11px; line-height: 1.25; }
  .controls { padding: 8px 14px; gap: 7px 12px; }
  .field { gap: 2px; }
  .field label { font-size: 10px; }
  select, input[type="number"] { padding: 5px 8px; font-size: 13px; }
  select { min-width: 0; }
  .field .row { gap: 6px; }
  button.ghost { padding: 5px 9px; font-size: 12px; }
  button#startBtn { padding: 7px 18px; font-size: 14px; border-radius: 6px; }
  main { padding: 10px; }
  .bpm { font-size: clamp(56px, 22vw, 150px); }
  .bpm.notes { font-size: clamp(30px, 8vw, 72px); }
  .key { font-size: clamp(32px, 8vw, 64px); }
  .keyblock { margin-top: 14px; }
  .raw, .status { font-size: 13px; }
  .raw { margin-top: 6px; }
  .level { margin-top: 12px; }
  .hint { padding: 7px 14px; font-size: 12px; }
  .credit { padding: 2px 14px 7px; }
}
</style>
</head>
<body>
  <header>
    <h1>Audio2Midi</h1>
    <span class="sub">BPM-Erkennung mit stabiler MIDI-Clock und Tonarterkennung &middot; Webversion</span>
  </header>

  <section class="controls">
    <div class="field">

      <select id="opMode">
        <option value="clock">Tempo &amp; MIDI-Clock</option>

    </div>
    <div class="field">

      <select id="srcMode">

    </div>
    <div class="field">
      <label for="audioIn">Audio-Eingang</label>
      <div class="row">
        <select id="audioIn"></select>
        <button id="loadInputs" class="ghost"
                title="Mikrofon freigeben, damit alle Eingaenge mit Namen erscheinen">
          Eingänge laden
        </button>

      <label class="chk" title="MIDI Start/Stop senden? Aus = nur durchgehende Clock; du startest dein Gerät selbst.">

      </label>

    <div class="field">

             title="Erkannte Noten für die MIDI-Ausgabe um N Oktaven verschieben">

    <button id="startBtn">Start</button>

  <main>
    <div class="bpm idle" id="bpm">—</div>
    <div class="cap" id="bpmCap">BPM</div>
    <div class="raw" id="raw">roh: —</div>
    <div class="status" id="status">bereit</div>

  <div class="hint" id="hint"></div>
  <div class="credit">codekoch / claude</div>

<script>
"use strict";

// ===========================================================================
// Stellschrauben (mirror der Python-Konstanten)
// ===========================================================================
const WINDOW_SECONDS   = 8.0;
const FFT_SIZE         = 2048;
const HOP_SIZE         = 512;
const TEMPO_PRIOR_OCT  = 0.9;
const CONF_RATIO       = 1.45;
const MIN_ONSET_SUM    = 1e-3;

const ANALYSIS_INTERVAL = 1.0;
const BPM_MEDIAN_LEN    = 16;
const SILENCE_DB        = -55.0;
const DEFAULT_MIN_BPM   = 70;
const DEFAULT_MAX_BPM   = 140;

// Tonart (Sha'ath-Profile, Konstanten wie im Python-Kern)
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const KS_MAJOR = [6.6,2.0,3.5,2.3,4.6,4.0,2.5,5.2,2.4,3.7,2.3,3.4];
const KS_MINOR = [6.5,2.7,3.5,5.4,2.6,3.5,2.5,5.2,4.0,2.7,4.3,3.2];
const BASS_TONIC_WEIGHT    = 0.30;
const CHROMA_LOG_COMP      = 10.0;
const KEY_EMA_SEC          = 15.0;
const KEY_SWITCH_CONFIRM   = 2;
const KEY_CONFIDENT_MARGIN = 0.12;
const KEY_CONFIDENT_MIN_N  = 16;

const PPQN          = 24;
const LOOKAHEAD_MS  = 120;
const TICK_MS       = 25;
const SLEW_BPM_PER_S = 8.0;
const DEADBAND_BPM  = 0.15;
const MSG_CLOCK = 0xF8, MSG_START = 0xFA, MSG_STOP = 0xFC;
// Beat-Phasenkopplung: die Clock laeuft im aus den Beats GEMESSENEN Song-Tempo
// (kein Drift durch Tempo-Schaetzfehler) und zieht die Beat-Phase zusaetzlich
// sanft aufs Song-Raster (Proportional-Nachregelung).
const BEAT_PLL_GAIN     = 0.10;   // Phasen-Anteil pro Beat
const BEAT_MAX_NUDGE_MS = 6.0;    // max. Phasenkorrektur pro Beat (kein hoerbarer Sprung)
const BEAT_VALID_MS     = 4000;   // so lange gilt ein Beat-Anker als aktuell

// Noten-Modus (Pitch -> MIDI)
const NOTE_CH          = 0;       // MIDI-Kanal 1
const NOTE_MIN_MIDI    = 36;      // C2
const NOTE_MAX_MIDI    = 96;      // C7
const NOTE_SILENCE_RMS = 0.004;   // ~ -48 dBFS: darunter startet keine neue Note
const NOTE_SUSTAIN_RMS = 0.0015;  // gehaltene Note bleibt an, solange Pegel darueber (Ausklingen)
const NOTE_OFF_FRAMES  = 3;       // so viele wirklich leise Frames vor Note Off (entprellt)
const YIN_THRESHOLD    = 0.15;    // YIN-Schwelle (kleiner = strenger)
const POLY_HARMONICS   = 8;       // so viele Obertoene gehen in die Salienz ein
const POLY_REL_THRESH  = 0.34;    // weitere Note nur, wenn Salienz >= Anteil der staerksten
const POLY_CANCEL_BINS = 3;       // +/- Bins, die je Oberton geloescht werden
const NOTE_MAX_POLY    = 5;       // max. gleichzeitige Noten

// ===========================================================================
// Radix-2-FFT (in-place)
// ===========================================================================
class FFT {
  constructor(n) {
    this.n = n;
    this.cos = new Float32Array(n / 2);
    this.sin = new Float32Array(n / 2);
    for (let i = 0; i < n / 2; i++) {
      this.cos[i] = Math.cos(-2 * Math.PI * i / n);
      this.sin[i] = Math.sin(-2 * Math.PI * i / n);
    }
    const bits = Math.round(Math.log2(n));
    this.rev = new Uint32Array(n);
    for (let i = 0; i < n; i++) {
      let x = i, r = 0;
      for (let j = 0; j < bits; j++) { r = (r << 1) | (x & 1); x >>= 1; }
      this.rev[i] = r >>> 0;
    }
  }
  transform(re, im) {
    const n = this.n, rev = this.rev;
    for (let i = 0; i < n; i++) {
      const j = rev[i];
      if (j > i) { let t = re[i]; re[i] = re[j]; re[j] = t; t = im[i]; im[i] = im[j]; im[j] = t; }
    }
    for (let size = 2; size <= n; size <<= 1) {
      const half = size >> 1, step = (n / size) | 0;
      for (let i = 0; i < n; i += size) {
        for (let k = 0; k < half; k++) {
          const ci = k * step, c = this.cos[ci], s = this.sin[ci];
          const a = i + k, b = a + half;
          const tre = re[b] * c - im[b] * s, tim = re[b] * s + im[b] * c;
          re[b] = re[a] - tre; im[b] = im[a] - tim;
          re[a] += tre;        im[a] += tim;
        }
      }
    }
  }
}

// ===========================================================================
// TempoAnalyzer: rollende Onset-Huellkurve -> Autokorrelation -> BPM
// ===========================================================================
class TempoAnalyzer {
  constructor(sampleRate, minBpm, maxBpm) {
    this.sr = sampleRate;
    this.minBpm = minBpm;
    this.maxBpm = maxBpm;
    this.envRate = sampleRate / HOP_SIZE;
    this.envLen = Math.round(WINDOW_SECONDS * this.envRate);
    this.centerBpm = Math.sqrt(minBpm * maxBpm);
    this.fft = new FFT(FFT_SIZE);
    this.win = new Float32Array(FFT_SIZE);
    for (let i = 0; i < FFT_SIZE; i++) {
      this.win[i] = 0.5 - 0.5 * Math.cos(2 * Math.PI * i / (FFT_SIZE - 1));
    }
    this.frame = new Float32Array(FFT_SIZE);
    this.re = new Float32Array(FFT_SIZE);
    this.im = new Float32Array(FFT_SIZE);
    this.prevMag = new Float32Array(FFT_SIZE / 2);
    this.onset = [];
    this._havePrev = false;
    // --- Tonart-Chroma ueber eine SEPARATE, groessere FFT ---
    // Bei FFT_SIZE 2048 sind die Bins (~23 Hz) im Bass/Mittenbereich groeber
    // als ein Halbton -> einzelne Tonklassen blieben leer ("Loecher"). Eine
    // groessere FFT (16384 ~ 0,34 s -> ~3-Hz-Bins) gibt eine saubere Ton-
    // klassen-Zuordnung. Wird nur ~1x/s ausgewertet (computeChroma).
    this.NC = 16384;
    this.fftC = new FFT(this.NC);
    this.winC = new Float32Array(this.NC);
    for (let i = 0; i < this.NC; i++) {
      this.winC[i] = 0.5 - 0.5 * Math.cos(2 * Math.PI * i / (this.NC - 1));
    }
    this.cbuf = new Float32Array(this.NC);   // rollender Sample-Puffer
    this.cbufFilled = 0;
    this.reC = new Float32Array(this.NC);
    this.imC = new Float32Array(this.NC);
    const halfC = this.NC / 2;
    this.binPc = new Int8Array(halfC);       // Bin -> Tonklasse (0=C), -1=ignorieren
    this.binBass = new Uint8Array(halfC);    // Bin im Bassbereich? (Grundton-Evidenz)
    for (let k = 1; k < halfC; k++) {
      const f = k * sampleRate / this.NC;
      if (f < 55 || f > 5000) { this.binPc[k] = -1; continue; }
      const midi = Math.round(69 + 12 * Math.log2(f / 440));
      this.binPc[k] = ((midi % 12) + 12) % 12;
      this.binBass[k] = (f >= 55 && f <= 260) ? 1 : 0;   // ~A1..C4
    }
    this.binPc[0] = -1;
  }
  pushChunk(chunk) {
    // Samples zusaetzlich in den groesseren Chroma-Puffer schieben.
    this.cbuf.copyWithin(0, HOP_SIZE);
    this.cbuf.set(chunk, this.NC - HOP_SIZE);
    if (this.cbufFilled < this.NC) this.cbufFilled += HOP_SIZE;

    this.frame.copyWithin(0, HOP_SIZE);
    this.frame.set(chunk, FFT_SIZE - HOP_SIZE);
    const re = this.re, im = this.im, win = this.win;
    for (let i = 0; i < FFT_SIZE; i++) { re[i] = this.frame[i] * win[i]; im[i] = 0; }
    this.fft.transform(re, im);
    const half = FFT_SIZE / 2;
    let flux = 0;
    const prev = this.prevMag;
    for (let k = 0; k < half; k++) {
      const mag = Math.hypot(re[k], im[k]);
      const d = mag - prev[k];
      if (d > 0) flux += d;
      prev[k] = mag;
    }
    if (this._havePrev) {
      this.onset.push(flux);
      if (this.onset.length > this.envLen) {
        this.onset.splice(0, this.onset.length - this.envLen);
      }
    }
    this._havePrev = true;
  }
  // Chroma (pcp + bass, je auf Summe 1, log-komprimiert) aus dem aktuellen
  // Sample-Puffer ueber die grosse FFT berechnen. null, solange der Puffer
  // noch nicht voll ist (~0,34 s nach Start).
  computeChroma() {
    if (this.cbufFilled < this.NC) return null;
    const re = this.reC, im = this.imC, win = this.winC;
    for (let i = 0; i < this.NC; i++) { re[i] = this.cbuf[i] * win[i]; im[i] = 0; }
    this.fftC.transform(re, im);
    const halfC = this.NC / 2;
    const c = new Float32Array(12), bas = new Float32Array(12);
    const bpc = this.binPc, bbs = this.binBass;
    for (let k = 1; k < halfC; k++) {
      const pc = bpc[k];
      if (pc < 0) continue;
      const mag = Math.hypot(re[k], im[k]);
      c[pc] += mag;
      if (bbs[k]) bas[pc] += mag;
    }
    const pcp = chromaNorm(c);
    const bass = chromaNorm(bas);
    return pcp ? { pcp, bass: bass || new Float32Array(12) } : null;
  }
  estimate() {
    const e = this.onset, L = e.length;
    if (L < this.envRate * 2) return null;       // ~2 s -> erste BPM erscheint frueher
    let mean = 0;
    for (let i = 0; i < L; i++) mean += e[i];
    mean /= L;
    if (mean < MIN_ONSET_SUM) return null;
    const x = new Float32Array(L);
    let energy = 0;
    for (let i = 0; i < L; i++) { x[i] = e[i] - mean; energy += x[i] * x[i]; }
    if (energy <= 0) return null;
    const lagMin = Math.max(2, Math.floor(60 * this.envRate / this.maxBpm));
    const lagMax = Math.min(L - 2, Math.ceil(60 * this.envRate / this.minBpm));
    if (lagMax <= lagMin) return null;
    const acfMax = Math.min(L - 2, lagMax * 4);
    const acf = new Float32Array(acfMax + 1);
    for (let lag = lagMin; lag <= acfMax; lag++) {
      let s = 0;
      for (let i = 0; i + lag < L; i++) s += x[i] * x[i + lag];
      acf[lag] = s / energy;
    }
    const harmW = [1.0, 0.6, 0.4, 0.25];
    let best = -Infinity, bestLag = -1, scoreSum = 0, scoreCnt = 0;
    const priorW = TEMPO_PRIOR_OCT;
    for (let lag = lagMin; lag <= lagMax; lag++) {
      let comb = 0;
      for (let h = 1; h <= 4; h++) { const hl = lag * h; if (hl <= acfMax) comb += harmW[h - 1] * acf[hl]; }
      const bpm = 60 * this.envRate / lag;
      const lo = Math.log2(bpm / this.centerBpm) / priorW;
      const prior = Math.exp(-0.5 * lo * lo);
      const score = comb * prior;
      scoreSum += score; scoreCnt++;
      if (score > best) { best = score; bestLag = lag; }
    }
    if (bestLag < 0) return null;
    const meanScore = scoreSum / Math.max(1, scoreCnt);
    const ratio = meanScore > 0 ? best / meanScore : 0;
    if (best <= 0 || ratio < CONF_RATIO) return null;
    let lag = bestLag;
    const y0 = acf[bestLag - 1], y1 = acf[bestLag], y2 = acf[bestLag + 1];
    const denom = (y0 - 2 * y1 + y2);
    if (denom !== 0) { const delta = 0.5 * (y0 - y2) / denom; if (delta > -1 && delta < 1) lag = bestLag + delta; }
    return { bpm: 60 * this.envRate / lag, conf: ratio };
  }
  // Beat-Phase: Abstand (in Sekunden) vom Ende der Huellkurve zum letzten Beat.
  // Sucht die Phase, bei der ein Puls-Raster im Beat-Abstand am besten auf die
  // Onset-Spitzen faellt. null, wenn zu wenig Daten. Der konstante Mess-Versatz
  // (Eingangslatenz) ist egal -- entscheidend ist, dass kein Drift entsteht.
  beatPhase(bpm) {
    const e = this.onset, L = e.length;
    if (L < this.envRate * 2 || bpm <= 0) return null;
    const P = 60 * this.envRate / bpm;          // Beat-Periode in Frames
    if (P < 2) return null;
    let mean = 0; for (let i = 0; i < L; i++) mean += e[i]; mean /= L;
    const steps = Math.max(12, Math.round(P));
    let bestOff = 0, bestScore = -Infinity;
    for (let s = 0; s < steps; s++) {
      const off = s * P / steps;
      let score = 0;
      for (let k = 0; ; k++) {
        const idx = Math.round(L - 1 - off - k * P);
        if (idx < 0) break;
        const v = e[idx] - mean;
        if (v > 0) score += v;                  // halbweg-gleichgerichtet
      }
      if (score > bestScore) { bestScore = score; bestOff = off; }
    }
    return bestOff / this.envRate;              // Sekunden seit letztem Beat
  }
}

// ===========================================================================
// Tonart-Bestimmung (Sha'ath-Profile, Bass-Evidenz) -- portiert aus
// classify_key() im Python-Kern.
// ===========================================================================
function chromaNorm(v) {
  let s = 0; for (let i = 0; i < 12; i++) s += v[i];
  if (s <= 0) return null;
  const out = new Float32Array(12);
  let s2 = 0;
  for (let i = 0; i < 12; i++) { out[i] = Math.log1p(CHROMA_LOG_COMP * (v[i] / s)); s2 += out[i]; }
  if (s2 > 0) for (let i = 0; i < 12; i++) out[i] /= s2;
  return out;
}
// Pearson-Korrelation von pcp mit dem um i rotierten Profil (Grundton -> i):
// rotiertes Profil r[j] = prof[(j - i) mod 12].
function profCorr(pcp, prof, i) {
  let ma = 0, mb = 0;
  for (let j = 0; j < 12; j++) { ma += pcp[j]; mb += prof[j]; }
  ma /= 12; mb /= 12;
  let num = 0, da = 0, db = 0;
  for (let j = 0; j < 12; j++) {
    const pj = prof[((j - i) % 12 + 12) % 12];
    const xa = pcp[j] - ma, xb = pj - mb;
    num += xa * xb; da += xa * xa; db += xb * xb;
  }
  const den = Math.sqrt(da * db);
  return den > 0 ? num / den : 0;
}
function classifyKey(pcp, bass) {
  const useBass = bass && bass.some(v => v > 0);
  const scores = [];
  for (let i = 0; i < 12; i++) {
    let bonus = 0;
    if (useBass) bonus = BASS_TONIC_WEIGHT * (bass[i] + 0.5 * bass[(i + 7) % 12]);
    scores.push([profCorr(pcp, KS_MAJOR, i) + bonus, NOTE_NAMES[i] + ' Dur']);
    scores.push([profCorr(pcp, KS_MINOR, i) + bonus, NOTE_NAMES[i] + ' Moll']);
  }
  scores.sort((a, b) => b[0] - a[0]);
  return { name: scores[0][1], margin: scores[0][0] - scores[1][0], second: scores[1][1] };
}
// Paralleltonart (relative Tonart): C-Dur <-> a-Moll usw.
function parallelKey(key) {
  const p = key.split(' ');
  if (p.length !== 2) return '';
  const i = NOTE_NAMES.indexOf(p[0]);
  if (i < 0) return '';
  if (p[1] === 'Dur')  return NOTE_NAMES[(i + 9) % 12] + ' Moll';
  if (p[1] === 'Moll') return NOTE_NAMES[(i + 3) % 12] + ' Dur';
  return '';
}

// ===========================================================================
// MidiClock -- 24 PPQN, Ticks per send(timestamp) im Voraus geplant.
// Scheduler-Timer hier im Hauptthread (kein Blob-Worker -> file://-tauglich).
// ===========================================================================
class MidiClock {
  constructor() {
    this.output = null;
    this.enabled = false;
    this.targetBpm = null;
    this.curBpm = 120;
    this.running = false;
    this.nextTick = 0;
    this.tickInBeat = 0;          // 0..23; Tick 0 ist ein Beat
    this._lastSched = 0;
    this.sendStartStop = false;   // MIDI Start/Stop senden? (Standard: nein)
    // Beat-Phasenkopplung
    this.anchor = 0;              // geglaettete performance.now-Zeit eines Song-Beats (ms)
    this.period = 0;              // Beat-Abstand fuers Grid = verfeinerte Periode (ms)
    this.anchorTime = 0;          // wann der Anker zuletzt aktualisiert wurde
    this.anchorValid = false;
    this.refPeriod = 0;           // aus aufeinanderfolgenden Beats gemessene Periode
    this.refAnchor = 0;           // letzter gemeldeter echter Beat (fuer die Messung)
    this._timer = setInterval(() => this._schedule(), TICK_MS);
  }
  setOutput(output) {
    if (this.output === output) return;
    if (this.running && this.sendStartStop) this._send(MSG_STOP);
    this.running = false;
    this.output = output;
  }
  enable() {
    if (this.enabled) return;
    this.enabled = true;
    this._lastSched = performance.now();
  }
  disable() {
    this.enabled = false;
    if (this.running && this.sendStartStop) this._send(MSG_STOP);
    this.running = false;
    this.anchorValid = false;
  }
  setTargetBpm(bpm) { this.targetBpm = bpm; }
  // Song-Beat-Raster melden: anchorMs = Zeit eines Beats, periodMs = Beat-Abstand.
  // Der Anker wird leicht geglaettet (auf das vorige Raster projiziert + EMA).
  setBeat(anchorMs, periodMs) {
    if (!(periodMs > 0)) return;
    const now = performance.now();
    const fresh = this.anchorValid && (now - this.anchorTime) < BEAT_VALID_MS;
    // Echte Beat-Periode aus dem Abstand zweier gemessener Beats verfeinern --
    // genauer als die Tempo-Schaetzung, daher laeuft die Clock im Song-Tempo
    // und driftet nicht weg.
    if (fresh && this.refPeriod > 0) {
      const dt = anchorMs - this.refAnchor;
      const beats = Math.round(dt / this.refPeriod);
      if (beats >= 1 && beats <= 8) {
        const measured = dt / beats;
        if (measured > periodMs * 0.6 && measured < periodMs * 1.6) {
          this.refPeriod += 0.35 * (measured - this.refPeriod);
        }
      }
    } else {
      this.refPeriod = periodMs;
    }
    this.refAnchor = anchorMs;
    // Anker fuers Grid auf die verfeinerte Periode projizieren + glaetten.
    if (fresh && this.period > 0) {
      const m = Math.round((anchorMs - this.anchor) / this.refPeriod);
      const proj = this.anchor + m * this.refPeriod;
      this.anchor = proj + 0.4 * (anchorMs - proj);
    } else {
      this.anchor = anchorMs;
    }
    this.period = this.refPeriod;
    this.anchorTime = now;
    this.anchorValid = true;
  }
  _beatActive(now) {
    return this.anchorValid && this.period > 0 && (now - this.anchorTime) < BEAT_VALID_MS;
  }
  _send(status, timestamp) {
    if (!this.output) return;
    try {
      if (timestamp === undefined) this.output.send([status]);
      else this.output.send([status], timestamp);
    } catch (e) { /* Port verschwunden o.ae. */ }
  }
  _schedule() {
    if (!this.enabled) return;
    const now = performance.now();
    const dt = Math.max(0, (now - this._lastSched) / 1000);
    this._lastSched = now;
    const haveTempo = this.targetBpm != null;

    if (!this.running) {
      if (!haveTempo) return;                 // auf erste Tempo-Schaetzung warten
      this.running = true;
      this.curBpm = this.targetBpm;
      this.tickInBeat = 0;
      // ersten Tick (Beat) auf den naechsten Song-Beat legen, falls bekannt
      if (this._beatActive(now)) {
        const m = Math.ceil((now + 20 - this.anchor) / this.period);
        this.nextTick = this.anchor + m * this.period;
      } else {
        this.nextTick = now + 20;
      }
      if (this.sendStartStop) this._send(MSG_START);
    } else if (haveTempo) {
      const diff = this.targetBpm - this.curBpm;
      if (Math.abs(diff) > DEADBAND_BPM) {
        const maxStep = SLEW_BPM_PER_S * dt;
        this.curBpm += Math.max(-maxStep, Math.min(maxStep, diff));
      }
    } else if (this.sendStartStop) {
      this._send(MSG_STOP); this.running = false; return;
    }
    // ohne Start/Stop bei Stille: einfach mit letztem Tempo weiterticken.

    if (this.nextTick < now - LOOKAHEAD_MS) this.nextTick = now;
    const horizon = now + LOOKAHEAD_MS;
    while (this.nextTick < horizon) {
      // Phase: Beat-Tick (Tick 0) sanft aufs Song-Raster ziehen.
      if (this.tickInBeat === 0 && this._beatActive(now)) {
        const m = Math.round((this.nextTick - this.anchor) / this.period);
        const err = (this.anchor + m * this.period) - this.nextTick;   // ms; >0 = Song-Beat spaeter
        if (Math.abs(err) < this.period * 0.45) {     // Halbbeat-Slips ignorieren
          this.nextTick += Math.max(-BEAT_MAX_NUDGE_MS,
                                    Math.min(BEAT_MAX_NUDGE_MS, err * BEAT_PLL_GAIN));
        }
      }
      // Tempo: bei aktivem Beat die GEMESSENE Song-Periode (kein Drift),
      // sonst das geschaetzte/geslewte Tempo.
      const eff = (this._beatActive(now) && this.refPeriod > 0)
        ? Math.max(20, 60000 / this.refPeriod)
        : Math.max(20, this.curBpm);
      this._send(MSG_CLOCK, this.nextTick);
      this.nextTick += 60000 / (eff * PPQN);
      this.tickInBeat = (this.tickInBeat + 1) % PPQN;
    }
  }
}

// ===========================================================================
// Noten-Modus: Pitch -> MIDI (monophon: YIN, polyphon: FFT-Peaks)
// ===========================================================================
function midiName(m) {
  return NOTE_NAMES[((m % 12) + 12) % 12] + (Math.floor(m / 12) - 1);
}
function velFromLevel(level) {
  const db = level > 0 ? 20 * Math.log10(level) : -90;
  return Math.max(1, Math.min(127, Math.round((db + 54) / 48 * 127)));
}
// Akkord aus den klingenden Tonklassen ableiten (Name oder '').
const CHORD_TYPES = [
  ['',     [0, 4, 7]],        // Dur
  ['m',    [0, 3, 7]],        // Moll
  ['dim',  [0, 3, 6]],
  ['aug',  [0, 4, 8]],
  ['7',    [0, 4, 7, 10]],
  ['maj7', [0, 4, 7, 11]],
  ['m7',   [0, 3, 7, 10]],
  ['sus4', [0, 5, 7]],
  ['sus2', [0, 2, 7]],
];
function chordName(pcList) {
  const present = new Set(pcList);
  if (present.size < 3) return '';
  let best = '', bestScore = 0.5;
  for (let root = 0; root < 12; root++) {
    if (!present.has(root)) continue;          // Grundton muss klingen
    for (const [suffix, ivs] of CHORD_TYPES) {
      let matched = 0;
      for (const iv of ivs) if (present.has((root + iv) % 12)) matched++;
      const missing = ivs.length - matched, extra = present.size - matched;
      const score = matched - 0.9 * missing - 0.5 * extra;
      if (matched >= 3 && score > bestScore) {
        bestScore = score; best = NOTE_NAMES[root] + suffix;
      }
    }
  }
  return best;
}
// YIN-Tonhoehe (monophon): kumulative mittlere Differenz + Schwelle +
// Parabel-Interpolation. Rueckgabe Frequenz in Hz oder 0 (kein Ton).
function yinPitch(buf, sr, threshold) {
  const n = buf.length, maxTau = n >> 1;
  const cmnd = new Float32Array(maxTau);
  cmnd[0] = 1;
  let runningSum = 0, tauEst = -1;
  for (let tau = 1; tau < maxTau; tau++) {
    let sum = 0;
    for (let i = 0; i < maxTau; i++) { const d = buf[i] - buf[i + tau]; sum += d * d; }
    runningSum += sum;
    cmnd[tau] = runningSum > 0 ? sum * tau / runningSum : 1;
  }
  for (let tau = 2; tau < maxTau; tau++) {
    if (cmnd[tau] < threshold) {
      while (tau + 1 < maxTau && cmnd[tau + 1] < cmnd[tau]) tau++;
      tauEst = tau; break;
    }
  }
  if (tauEst === -1) return 0;
  let bt = tauEst;
  if (tauEst > 1 && tauEst + 1 < maxTau) {
    const s0 = cmnd[tauEst - 1], s1 = cmnd[tauEst], s2 = cmnd[tauEst + 1];
    const denom = 2 * (2 * s1 - s2 - s0);
    if (denom !== 0) bt = tauEst + (s2 - s0) / denom;
  }
  return bt > 0 ? sr / bt : 0;
}

class NoteEngine {
  constructor(sampleRate, poly, send) {
    this.sr = sampleRate;
    this.poly = poly;
    this.send = send;                 // (bytes[]) => void
    this.win = poly ? 4096 : 2048;    // Analysefenster (poly braucht mehr Aufloesung)
    this.buf = new Float32Array(this.win);
    this.filled = 0;
    this.display = '—';
    this.transpose = 0;               // Oktav-Transponierung der Ausgabe (Halbtoene)
    this.curNote = -1; this.candNote = -1; this.candN = 0; this.offCount = 0;   // mono
    this.active = new Map();          // poly: midi -> Anzahl Frames ohne Beleg
    if (poly) {
      this.fft = new FFT(this.win);
      this.re = new Float32Array(this.win);
      this.im = new Float32Array(this.win);
      this.han = new Float32Array(this.win);
      for (let i = 0; i < this.win; i++) this.han[i] = 0.5 - 0.5 * Math.cos(2 * Math.PI * i / (this.win - 1));
    }
  }
  push(chunk) {
    const h = chunk.length;
    this.buf.copyWithin(0, h);
    this.buf.set(chunk, this.win - h);
    if (this.filled < this.win) this.filled += h;
  }
  process(level) {
    if (this.filled < this.win) return;
    if (this.poly) this._poly(level); else this._mono(level);
  }
  // Note-On/Off mit Oktav-Transponierung (auf MIDI-Bereich begrenzt). Da die
  // Transponierung beim Senden angewandt wird, passen On und Off zusammen.
  _out(note) { return Math.max(0, Math.min(127, note + this.transpose)); }
  _noteOn(note, vel) { this.send([0x90 | NOTE_CH, this._out(note), vel]); }
  _noteOff(note) { this.send([0x80 | NOTE_CH, this._out(note), 0]); }
  setTranspose(semi) {
    if (semi === this.transpose) return;
    this.allOff();                 // offene Noten mit der ALTEN Transponierung beenden
    this.transpose = semi;
  }
  _mono(level) {
    let note = -1;
    // Zum HALTEN einer Note genuegt ein niedrigerer Pegel (Hysterese) -- ein
    // ausklingender Ton reisst so nicht ab und wird nicht neu getriggert.
    const gate = this.curNote !== -1 ? NOTE_SUSTAIN_RMS : NOTE_SILENCE_RMS;
    if (level > gate) {
      const f = yinPitch(this.buf, this.sr, YIN_THRESHOLD);
      if (f > 0) {
        const m = Math.round(69 + 12 * Math.log2(f / 440));
        if (m >= NOTE_MIN_MIDI && m <= NOTE_MAX_MIDI) note = m;
      }
    }
    if (note === this.curNote && this.curNote !== -1) {   // klar gehalten
      this.offCount = 0; this.candNote = -1; this.candN = 0; return;
    }
    if (note === -1) {
      // Keine klare Tonhoehe. Klingt noch genug Pegel? -> Note halten
      // (YIN findet beim Ausklingen oft kurz nichts). Sonst nach Entprellung aus.
      if (this.curNote !== -1 && level > NOTE_SUSTAIN_RMS) {
        this.offCount = 0;
      } else if (this.curNote !== -1) {
        if (++this.offCount >= NOTE_OFF_FRAMES) {
          this._noteOff(this.curNote); this.curNote = -1; this.offCount = 0; this.display = '—';
        }
      }
      this.candNote = -1; this.candN = 0;
      return;
    }
    // neuer Ton (anders als der gehaltene) -> Wechsel kurz entprellen
    this.offCount = 0;
    if (note === this.candNote) this.candN++; else { this.candNote = note; this.candN = 1; }
    const need = (this.curNote === -1) ? 1 : 2;
    if (this.candN >= need) {
      if (this.curNote !== -1) this._noteOff(this.curNote);
      this._noteOn(note, velFromLevel(level));
      this.curNote = note; this.candNote = -1; this.candN = 0;
      this.display = midiName(this._out(note));
    }
  }
  _poly(level) {
    // Harmonische-Summen-Salienz mit iterativer Oberton-Ausloeschung:
    // Fuer jede Kandidaten-Note wird die Magnitude ihrer Obertonreihe summiert
    // (Grundton am staerksten gewichtet). Die staerkste Note wird akzeptiert,
    // ihre Obertonreihe aus dem Spektrum geloescht und neu gesucht -- so wird
    // ein Oberton nicht faelschlich als eigene Note erkannt.
    const detected = new Set();
    if (level > NOTE_SILENCE_RMS) {
      const N = this.win, re = this.re, im = this.im, han = this.han;
      for (let i = 0; i < N; i++) { re[i] = this.buf[i] * han[i]; im[i] = 0; }
      this.fft.transform(re, im);
      const half = N >> 1, spec = new Float32Array(half);
      let maxMag = 0;
      for (let k = 1; k < half; k++) { const m = Math.hypot(re[k], im[k]); spec[k] = m; if (m > maxMag) maxMag = m; }
      if (maxMag > 0) {
        const nyq = this.sr / 2, scale = N / this.sr;
        const harmAt = (f) => {                  // Peak-Magnitude nahe f (+/-2 Bins)
          const b = Math.round(f * scale);
          const lo = Math.max(1, b - 2), hi = Math.min(half - 1, b + 2);
          let mx = 0; for (let k = lo; k <= hi; k++) if (spec[k] > mx) mx = spec[k];
          return mx;
        };
        let firstSal = 0;
        for (let iter = 0; iter < NOTE_MAX_POLY; iter++) {
          let bestM = -1, bestS = 0;
          for (let m = NOTE_MIN_MIDI; m <= NOTE_MAX_MIDI; m++) {
            if (detected.has(m)) continue;
            const f0 = 440 * Math.pow(2, (m - 69) / 12);
            if (f0 < 50 || f0 >= nyq) continue;
            let s = 0;
            for (let h = 1; h <= POLY_HARMONICS; h++) {
              const f = f0 * h; if (f >= nyq) break;
              s += harmAt(f) / h;                // Grundton am staerksten gewichtet
            }
            if (s > bestS) { bestS = s; bestM = m; }
          }
          if (bestM < 0) break;
          if (iter === 0) firstSal = bestS;
          else if (bestS < firstSal * POLY_REL_THRESH) break;
          detected.add(bestM);
          const f0 = 440 * Math.pow(2, (bestM - 69) / 12);   // Obertonreihe loeschen
          for (let h = 1; h <= POLY_HARMONICS; h++) {
            const f = f0 * h; if (f >= nyq) break;
            const b = Math.round(f * scale), w = POLY_CANCEL_BINS;
            for (let k = Math.max(0, b - w); k <= Math.min(half - 1, b + w); k++) spec[k] = 0;
          }
        }
      }
    }
    const vel = velFromLevel(level);
    for (const m of detected) {
      if (!this.active.has(m)) this._noteOn(m, vel);
      this.active.set(m, 0);
    }
    for (const [m, miss] of [...this.active]) {          // Note-Off mit 1 Frame Nachsicht
      if (detected.has(m)) continue;
      if (miss >= 1) { this._noteOff(m); this.active.delete(m); }
      else this.active.set(m, miss + 1);
    }
    const on = [...this.active.keys()].filter(m => this.active.get(m) === 0).sort((a, b) => a - b);
    const ch = chordName(on.map(m => ((m % 12) + 12) % 12));
    this.display = on.length
      ? on.map(m => midiName(this._out(m))).join(' ') + (ch ? '  (' + ch + ')' : '')
      : '—';
  }
  allOff() {
    if (this.curNote !== -1) { this._noteOff(this.curNote); this.curNote = -1; }
    for (const m of this.active.keys()) this._noteOff(m);
    this.active.clear();
    this.offCount = 0; this.candNote = -1; this.candN = 0;
    this.display = '—';
  }
}

    if (d.deviceId === 'communications') continue;
    if (seen.has(d.deviceId)) continue;
    const label = d.label || ('Eingang ' + (i++) + ' (Name nach Freigabe)');
    elInput.add(new Option(label, d.deviceId));
    seen.add(d.deviceId); count++;
  }
  elInput.value = [...elInput.options].some(o => o.value === prev) ? prev : '';
  return count;
}
async function unlockInputs() {
  if (inputsUnlocked || unlocking) return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
  unlocking = true;
  elLoad.disabled = true;
  setHint('Eingaenge werden geladen … bitte den Mikrofon-Zugriff erlauben.');
  let tmp = null;
  try {
    tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
    captureGranted(tmp);
    inputsUnlocked = true;
    const n = await refreshAudioInputs();
    elLoad.textContent = 'Aktualisieren';
    setHint(n + ' Eingang/Eingaenge geladen. Gewuenschten Eingang waehlen und Start druecken.');
  } catch (e) {
    setHint('Mikrofon-Zugriff abgelehnt — ohne Freigabe zeigt der Browser nur den Standard-Eingang. (' + e.message + ')', true);
  } finally {
    if (tmp) tmp.getTracks().forEach(t => t.stop());
    unlocking = false;
    if (!running) elLoad.disabled = false;
  }
}

// Quellenwahl: Eingang/Mikrofon vs. Wiedergabe mithören. Die Steuerelemente
// fuer die Mikrofon-Geraetewahl sind im Mithoer-Modus nicht relevant.
function applySource() {
  const display = elSource.value === 'display';
  elInput.disabled = display;
  elLoad.disabled = display;
  if (display) {
    setHint('Wiedergabe mithören: Beim Start „Ganzer Bildschirm" + „Systemaudio teilen" '
          + '(Windows/Chrome) bzw. einen Tab + „Tab-Audio teilen" wählen. '
          + 'macOS/Safari: nur Tab-Audio, kein System-Audio.');
  } else {
    setHint('„Eingänge laden“ klicken, um alle Audio-Eingänge mit Namen zu sehen.');
  }
}

// Steuerelement-Zustand je nach Betriebsart (Clock vs. Noten-Modus).
function applyModeControls() {
  const note = opMode !== 'clock';
  elMin.disabled = note; elMax.disabled = note; elKeyToggle.disabled = note;
  elStartStop.disabled = note;        // Start/Stop nur im Clock-Modus relevant
  elOctave.disabled = !note;          // Oktav-Transponierung nur im Noten-Modus
}
function applyMode() {
  opMode = elMode.value;
  const note = opMode !== 'clock';
  applyModeControls();
  elBpmCap.textContent = note ? (opMode === 'poly' ? 'NOTEN' : 'NOTE') : 'BPM';
  elBpm.classList.toggle('notes', note);
  setBpmText('—');
  if (note) elKeyBlock.style.display = 'none';
  else if (keyEnabled) elKeyBlock.style.display = '';
  if (opMode === 'mono') {
    setHint('Monophon: erkennt EINE Note (Gesang/Bass/Lead/einzelnes Instrument) und sendet '
          + 'sie als MIDI-Note. Klare, einstimmige Quelle nötig. MIDI-Ausgang wählen.');
  } else if (opMode === 'poly') {
    setHint('Polyphon: erkennt mehrere Noten gleichzeitig (begrenzte Genauigkeit, etwas höhere '
          + 'Latenz). MIDI-Ausgang wählen.');
  } else {
    applySource();
  }
}

// Liefert den MediaStream je nach Quelle. 'display' nutzt die Screen-Capture-
// API (getDisplayMedia): erfasst Tab-/System-Audio. Chrome verlangt dabei
// einen Video-Track -> wir fordern ihn an, schalten ihn aber ab (enabled=false)
// und werten nur das Audio aus.
async function acquireStream(mode) {
  const audio = { echoCancellation: false, noiseSuppression: false, autoGainControl: false };
  if (mode === 'display') {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
      throw new Error('Dieser Browser kann keine Wiedergabe mithören (getDisplayMedia fehlt).');
    }
    const s = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 1 }, audio, systemAudio: 'include'
    });
    if (s.getAudioTracks().length === 0) {
      s.getTracks().forEach(t => t.stop());
      throw new Error('Kein Audio geteilt. Beim Teilen unbedingt „Systemaudio teilen" '
                    + '(ganzer Bildschirm) bzw. „Tab-Audio teilen" ankreuzen.');
    }
    s.getVideoTracks().forEach(t => { t.enabled = false; });   // Video nicht gebraucht
    return s;
  }
  const constraints = { audio };
  if (elInput.value) constraints.audio.deviceId = { exact: elInput.value };
  return navigator.mediaDevices.getUserMedia(constraints);
}

// --- Sitzung starten / stoppen ---
async function start() {
  const minBpm = clampBpm(parseFloat(elMin.value), DEFAULT_MIN_BPM);
  const maxBpm = clampBpm(parseFloat(elMax.value), DEFAULT_MAX_BPM);
  if (!(minBpm < maxBpm)) { setHint('BPM-Bereich ungueltig: von < bis (z. B. 70 bis 140).', true); return; }

  const mode = elSource.value;          // 'input' | 'display'
  try {
    mediaStream = await acquireStream(mode);
  } catch (e) {
    setHint((mode === 'display' ? 'Mithören fehlgeschlagen: ' : 'Mikrofon-/Eingangszugriff fehlgeschlagen: ')
          + e.message, true);
    setStatus('FEHLER');
    return;
  }

  if (mode === 'input') {
    captureGranted(mediaStream);
    inputsUnlocked = true;
    refreshAudioInputs();
  }
  // Beendet der Nutzer das Teilen/die Freigabe im Browser, endet der Audio-
  // Track -> Sitzung sauber stoppen.
  const at0 = mediaStream.getAudioTracks()[0];
  if (at0) at0.addEventListener('ended', () => {
    if (running) { stop(); setHint('Mithören/Aufnahme beendet (Quelle gestoppt).'); }
  });

  const noteMode = opMode !== 'clock';
  try {
    audioCtx = new AudioContext();
    await audioCtx.resume();
    const sr = audioCtx.sampleRate;

    if (noteMode) {
      noteEngine = new NoteEngine(sr, opMode === 'poly',
        (bytes) => { if (midiOut) { try { midiOut.send(bytes); } catch (e) {} } });
      noteTranspose = (parseInt(elOctave.value, 10) || 0) * 12;
      noteEngine.transpose = noteTranspose;
    } else {
      analyzer = new TempoAnalyzer(sr, minBpm, maxBpm);
    }

    const src = audioCtx.createMediaStreamSource(mediaStream);
    // ScriptProcessorNode statt AudioWorklet: laedt kein Modul -> auch unter
    // file:// nutzbar. Im Noten-Modus kleinere Bloecke (geringere Latenz).
    const bufSize = noteMode ? 1024 : 2048;
    procNode = audioCtx.createScriptProcessor(bufSize, 1, 1);
    procNode.onaudioprocess = (ev) => {
      const ib = ev.inputBuffer;
      const chs = ib.numberOfChannels, n = ib.length;
      const mono = new Float32Array(n);
      for (let c = 0; c < chs; c++) {
        const d = ib.getChannelData(c);
        for (let i = 0; i < n; i++) mono[i] += d[i];
      }
      if (chs > 1) for (let i = 0; i < n; i++) mono[i] /= chs;
      if (noteMode) {
        let sum = 0; for (let i = 0; i < n; i++) sum += mono[i] * mono[i];
        const rms = Math.sqrt(sum / n);
        levelEma = 0.85 * levelEma + 0.15 * rms;
        lastChunkTime = performance.now();
        noteEngine.push(mono);
        noteEngine.process(rms);
      } else {
        for (let off = 0; off + HOP_SIZE <= n; off += HOP_SIZE) onChunk(mono.subarray(off, off + HOP_SIZE));
      }
    };
    src.connect(procNode);
    // ScriptProcessor feuert nur, wenn er zum Ausgang verbunden ist.
    // Stumm geschalteter Gain -> kein Ton, keine Rueckkopplung.
    sinkNode = audioCtx.createGain();
    sinkNode.gain.value = 0;
    procNode.connect(sinkNode);
    sinkNode.connect(audioCtx.destination);
  } catch (e) {
    setHint('Audio konnte nicht gestartet werden: ' + e.message, true);
    setStatus('FEHLER');
    if (audioCtx) { try { await audioCtx.close(); } catch (_) {} audioCtx = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    procNode = null; sinkNode = null; analyzer = null; noteEngine = null;
    return;
  }

  estimates = []; lastRaw = 0; levelEma = 0; haveEstimate = false;
  resetKey();
  if (!noteMode) {
    clock.sendStartStop = elStartStop.checked;
    clock.enable();
    analyzeTimer = setInterval(analyze, ANALYSIS_INTERVAL * 1000);
  }
  lastChunkTime = performance.now();
  running = true;
  elStart.textContent = 'Stopp';
  elStart.classList.add('stop');
  setControlsDisabled(true);
  setHint(noteMode
    ? 'Läuft – erkannte Noten werden an den MIDI-Ausgang gesendet. Tab im Vordergrund lassen.'
    : 'Laeuft. Tab im Vordergrund lassen, damit die Clock stabil bleibt.');
}

function stop() {
  running = false;
  if (analyzeTimer) { clearInterval(analyzeTimer); analyzeTimer = null; }
  clock.disable();
  if (noteEngine) { noteEngine.allOff(); noteEngine = null; }
  if (procNode) { procNode.disconnect(); procNode.onaudioprocess = null; procNode = null; }
  if (sinkNode) { sinkNode.disconnect(); sinkNode = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  analyzer = null; haveEstimate = false; estimates = [];
  resetKey();
  if (keyEnabled) updateKeyDisplay();
  elStart.textContent = 'Start';
  elStart.classList.remove('stop');
  setControlsDisabled(false);
  applySource();                      // Eingangsfelder je nach Quelle wieder richtig
  applyModeControls();                // BPM-/Tonart-Felder je nach Betriebsart
  setBpmText('—');
  elRaw.textContent = opMode === 'clock' ? 'roh: —' : '';
  setStatus('bereit');
  updateLevel(-60);
}

// --- Audio-Bloecke + Analyse ---
function onChunk(chunk) {
  if (!analyzer) return;
  lastChunkTime = performance.now();
  analyzer.pushChunk(chunk);
  let sum = 0;
  for (let i = 0; i < chunk.length; i++) sum += chunk[i] * chunk[i];
  const rms = Math.sqrt(sum / chunk.length);
  levelEma = 0.85 * levelEma + 0.15 * rms;
}
function analyze() {
  if (!analyzer) return;
  const db = levelEma > 0 ? 20 * Math.log10(levelEma) : -120;
  if (db < SILENCE_DB) {
    estimates = []; haveEstimate = false; clock.setTargetBpm(null);
    resetKey();
    return;
  }
  const est = analyzer.estimate();
  if (est) {
    lastRaw = est.bpm;
    estimates.push(est.bpm);
    if (estimates.length > BPM_MEDIAN_LEN) estimates.splice(0, estimates.length - BPM_MEDIAN_LEN);
    haveEstimate = true;
    const med = median(estimates);
    clock.setTargetBpm(med);
    // Beat-Phase melden -> die Clock rastet aufs Song-Raster ein (gegen Drift).
    const offSec = analyzer.beatPhase(med);
    if (offSec != null) {
      clock.setBeat(lastChunkTime - offSec * 1000, 60000 / med);
    }
  }
  // Tonart-Chroma (grosse FFT) nur rechnen, wenn die Anzeige aktiv ist -- spart
  // spuerbar Rechenzeit (v. a. auf dem Handy), wenn die Tonart nicht gebraucht wird.
  if (keyEnabled) updateKey();
}

// --- Tonart: Chroma -> 50% schnelle EMA + 50% Gesamtmittel -> Klassifikation
//     mit Hysterese (wie im Python-Kern). Laeuft immer mit (guenstig); die
//     Anzeige erscheint nur, wenn der Tonart-Button aktiv ist.
function resetKey() {
  keyDisp = '—'; keyPend = null; keyPendN = 0; keyConfident = false;
  emaPcp = emaBass = cumPcp = cumBass = null; cumN = 0;
  if (analyzer) { analyzer.cbuf.fill(0); analyzer.cbufFilled = 0; }
}
function updateKey() {
  const ch = analyzer.computeChroma();
  if (!ch) return;
  const p = ch.pcp, b = ch.bass;
  if (emaPcp === null) {
    emaPcp = p.slice(); emaBass = b.slice();
    cumPcp = p.slice(); cumBass = b.slice(); cumN = 1;
  } else {
    for (let i = 0; i < 12; i++) {
      emaPcp[i]  = (1 - KEY_EMA_A) * emaPcp[i]  + KEY_EMA_A * p[i];
      emaBass[i] = (1 - KEY_EMA_A) * emaBass[i] + KEY_EMA_A * b[i];
      cumPcp[i] += p[i]; cumBass[i] += b[i];
    }
    cumN++;
  }
  const prof = new Float32Array(12), bprof = new Float32Array(12);
  for (let i = 0; i < 12; i++) {
    prof[i]  = 0.5 * emaPcp[i]  + 0.5 * (cumPcp[i]  / cumN);
    bprof[i] = 0.5 * emaBass[i] + 0.5 * (cumBass[i] / cumN);
  }
  const r = classifyKey(prof, bprof);
  const cand = r.name;
  // Hysterese: Wechsel erst nach KEY_SWITCH_CONFIRM gleichen Folgeschaetzungen.
  if (cand !== keyDisp) {
    if (keyDisp === '—' || cand === '—') { keyDisp = cand; keyPend = null; keyPendN = 0; }
    else if (cand === keyPend) {
      keyPendN++;
      if (keyPendN >= KEY_SWITCH_CONFIRM) { keyDisp = cand; keyPend = null; keyPendN = 0; }
    } else { keyPend = cand; keyPendN = 1; }
  } else { keyPend = null; keyPendN = 0; }
  keyConfident = (cand === keyDisp && cand !== '—'
                  && r.margin >= KEY_CONFIDENT_MARGIN && cumN >= KEY_CONFIDENT_MIN_N);
}
function updateKeyDisplay() {
  const show = running && keyDisp !== '—';
  elKeyName.textContent = show ? keyDisp : '—';
  const par = show ? parallelKey(keyDisp) : '';
  elKeyPar.textContent = par ? '(' + par + ')' : '';
  // Gedimmt, solange die Erkennung noch unsicher ist (wie im Python-Kern).
  elKeyName.classList.toggle('idle', !(show && keyConfident));
}

// --- Anzeige ---
function render() {
  if (running) {
    const db = levelEma > 0 ? 20 * Math.log10(levelEma) : -120;
    updateLevel(db);
    if (opMode !== 'clock') {
      // Noten-Modus: aktuell gesendete Note(n) anzeigen
      if (performance.now() - lastChunkTime > 1500) setStatus('KEIN AUDIO – Eingang prüfen');
      else setStatus(opMode === 'poly' ? 'Noten-Modus (polyphon)' : 'Noten-Modus (monophon)');
      const disp = noteEngine ? noteEngine.display : '—';
      elBpm.textContent = disp;
      elBpm.classList.toggle('idle', disp === '—');
      elRaw.textContent = '';
    } else if (performance.now() - lastChunkTime > 1500) {
      setStatus('KEIN AUDIO – Eingang prüfen'); setBpmText('—');
    } else if (db < SILENCE_DB) {
      setStatus('KEIN SIGNAL'); setBpmText('—');
    } else if (!haveEstimate) {
      setStatus('analysiere …'); setBpmText('—');
    } else {
      setStatus('laeuft'); setBpmText(String(Math.round(median(estimates))));
      elRaw.textContent = 'roh: ' + (lastRaw ? lastRaw.toFixed(1) : '—');
    }
  }
  if (keyEnabled) updateKeyDisplay();
  requestAnimationFrame(render);
}

// --- Hilfen ---
function median(arr) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a, b) => a - b);
  const m = s.length >> 1;
  return s.length % 2 ? s[m] : 0.5 * (s[m - 1] + s[m]);
}
function clampBpm(v, fallback) { return isFinite(v) ? Math.min(300, Math.max(30, v)) : fallback; }
function setStatus(txt) { elStatus.textContent = txt; }
function setBpmText(txt) { elBpm.textContent = txt; elBpm.classList.toggle('idle', txt === '—'); }
function setHint(txt, isError) { elHint.textContent = txt; elHint.classList.toggle('error', !!isError); }
function updateLevel(db) {
  const pct = Math.max(0, Math.min(100, (db + 60) / 60 * 100));
  elBar.style.width = pct + '%';
  elDb.textContent = (db <= -60 ? '-60' : db.toFixed(0)) + ' dB';
}
function setControlsDisabled(on) {
  elMode.disabled = on; elSource.disabled = on; elInput.disabled = on; elLoad.disabled = on;
  elMin.disabled = on; elMax.disabled = on;
}

// --- Verdrahtung ---
elStart.addEventListener('click', () => running ? stop() : start());
elMidi.addEventListener('change', applyMidiOutput);
elLoad.addEventListener('click', () => { inputsUnlocked = false; unlockInputs(); });
elInput.addEventListener('focus', () => { if (!inputsUnlocked) unlockInputs(); });
elMidi.addEventListener('focus', initMidi);
elSource.addEventListener('change', applySource);
elMode.addEventListener('change', applyMode);
elStartStop.addEventListener('change', () => { clock.sendStartStop = elStartStop.checked; });
elOctave.addEventListener('change', () => {
  const oct = Math.max(-4, Math.min(4, parseInt(elOctave.value, 10) || 0));
  elOctave.value = oct;
  noteTranspose = oct * 12;
  if (noteEngine) noteEngine.setTranspose(noteTranspose);   // offene Noten sauber umsetzen
});
elKeyToggle.addEventListener('click', () => {
  keyEnabled = !keyEnabled;
  elKeyBlock.style.display = keyEnabled ? '' : 'none';
  elKeyToggle.textContent = keyEnabled ? 'ausblenden' : 'anzeigen';
  elKeyToggle.classList.toggle('on', keyEnabled);
  if (keyEnabled) updateKeyDisplay();
});

window.addEventListener('DOMContentLoaded', () => {
  elMidi.add(new Option('Kein MIDI (Liste öffnen zum Verbinden)', ''));
  // "Wiedergabe mithören" braucht getDisplayMedia -- auf Android/Mobil-Chrome
  // nicht vorhanden. Dann die Option sichtbar deaktivieren statt erst beim
  // Start zu scheitern.
  if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
    const opt = [...elSource.options].find(o => o.value === 'display');
    if (opt) { opt.disabled = true; opt.textContent += ' – hier nicht verfügbar'; }
    if (elSource.value === 'display') { elSource.value = 'input'; applySource(); }
  }
  refreshAudioInputs();
  setBpmText('—');
  updateLevel(-60);
  setStatus('bereit');
  if (!window.isSecureContext) {
    setHint('Hinweis: Ohne sicheren Kontext (lokale Datei, http://localhost oder HTTPS) können Mikrofon/MIDI gesperrt sein.', true);
  } else {
    setHint('„Eingänge laden“ klicken, um alle Audio-Eingänge mit Namen zu sehen. MIDI-Liste öffnen, um den MIDI-Ausgang zu wählen.');
  }
  requestAnimationFrame(render);
});
</script>
</body>
</html>
