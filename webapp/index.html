<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audio2Midi -- BPM, MIDI-Clock & Tonart (Webversion)</title>
<!--
  Audio2Midi Webversion: BPM-Erkennung mit MIDI-Clock, Tonerkennung mit Midi-Ausgabe und Tonart-Anzeige -- eine eigenstaendige HTML-Datei. Laeuft direkt im Browser
  (Doppelklick / Strg+O) oder ueber GitHub Pages; kein Server noetig.

  Quelle wahlweise Mikrofon/Line-In (getUserMedia) ODER die Wiedergabe
  mithoeren (getDisplayMedia: Tab-/System-Audio -- "Loopback").

  Umsetzung:
    * ScriptProcessorNode statt AudioWorklet. Der Worklet laedt ein Modul,
      was der Browser unter file:// (Origin "null") blockiert. Der
      ScriptProcessor laedt nichts nach und laeuft daher auch lokal. Er ist
      aelter/deprecated, fuer diese leichte Analyse aber voellig ausreichend.
    * MIDI-Clock-Timer im Hauptthread (kein Blob-Worker -- der waere unter
      file:// ebenfalls gesperrt).
    * Tonart-Chroma ueber eine separate groessere FFT (saubere Halbton-
      Aufloesung im Bass/Mittenbereich).

  Voraussetzungen: Chrome/Edge/Opera (Web MIDI). Beim Start fragt der Browser
  nach Mikrofon-Zugriff. Fuer die MIDI-Ausgabe an Software auf demselben
  Rechner einen virtuellen MIDI-Port einrichten (Windows: loopMIDI, macOS:
  IAC-Treiber).

  Autoren: codekoch / claude
-->
<style>
:root {
  --bg: #131210; --surface: #1f1d1a; --surface-hi: #2a2723;
  --fg: #f2efe9; --muted: #8a857c; --accent: #1d9e75; --warn: #f0a53e;
  --bar-bg: #2a2723;
}
* { box-sizing: border-box; }
body {
  margin: 0; min-height: 100vh; background: var(--bg); color: var(--fg);
  font-family: "Segoe UI", Helvetica, Arial, sans-serif;
  display: flex; flex-direction: column;
}
header {
  padding: 14px 24px; border-bottom: 1px solid var(--surface);
  display: flex; align-items: baseline; gap: 12px;
}
header h1 { font-size: 18px; font-weight: 600; margin: 0; }
header .sub { color: var(--muted); font-size: 13px; }
.controls {
  display: flex; flex-wrap: wrap; gap: 16px 20px; align-items: flex-end;
  padding: 16px 24px; border-bottom: 1px solid var(--surface);
}
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.field .row { display: flex; align-items: center; gap: 8px; }
button.ghost {
  background: var(--surface); color: var(--fg); border: 1px solid var(--surface-hi);
  border-radius: 6px; padding: 8px 12px; font-size: 13px; cursor: pointer; white-space: nowrap;
}
button.ghost:hover { background: var(--surface-hi); }
button.ghost:disabled { opacity: .5; cursor: default; }
button.ghost.on { border-color: var(--accent); color: var(--accent); }
button.ghost.rec { border-color: #e0564e; color: #e0564e; }   /* Aufnahme laeuft */
select, input[type="number"] {
  background: var(--surface); color: var(--fg); border: 1px solid var(--surface-hi);
  border-radius: 6px; padding: 8px 10px; font-size: 14px;
}
select { min-width: 200px; }
input[type="number"] { width: 72px; }
.range { display: flex; align-items: center; gap: 6px; }
.filelbl { font-size: 13px; color: var(--muted); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
button#startBtn {
  margin-left: auto; background: var(--accent); color: #04342c; border: 0;
  border-radius: 8px; padding: 12px 28px; font-size: 16px; font-weight: 700; cursor: pointer;
}
button#startBtn.stop { background: var(--warn); color: #412402; }
button#startBtn:disabled { opacity: .4; cursor: default; }
.chk { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--fg); cursor: pointer; padding: 7px 0; }
.chk input { accent-color: var(--accent); }
main {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; padding: 24px;
}
.bpm {
  font-size: clamp(96px, 28vw, 280px); font-weight: 700; line-height: 1;
  color: var(--accent); font-variant-numeric: tabular-nums;
}
.bpm.idle { color: var(--muted); opacity: .5; }
.bpm.notes { font-size: clamp(36px, 9vw, 100px); }   /* Noten-Modus: mehrere Namen */
.keyblock { margin-top: 26px; text-align: center; }
.key { font-size: clamp(40px, 9vw, 88px); font-weight: 700; line-height: 1; }
#keyName { color: var(--accent); }
#keyName.idle { color: var(--muted); opacity: .6; }
.par { font-size: .42em; font-weight: 600; color: var(--muted); margin-left: .2em; }
.cap { font-size: 14px; color: var(--muted); letter-spacing: .2em; }
.raw { font-size: 15px; color: var(--muted); margin-top: 12px; }
.status { font-size: 15px; color: var(--muted); margin-top: 2px; min-height: 1.2em; }
.level { width: min(680px, 90%); margin: 22px auto 0; display: flex; align-items: center; gap: 12px; }
.level .lbl { font-size: 12px; color: var(--muted); }
.track { flex: 1; height: 12px; background: var(--bar-bg); border-radius: 6px; overflow: hidden; }
.track > div { height: 100%; width: 0; background: var(--accent); transition: width .08s linear; }
.level .db { font-size: 12px; color: var(--muted); width: 56px; text-align: right; }
.hint { padding: 10px 24px; font-size: 13px; color: var(--muted); border-top: 1px solid var(--surface); min-height: 1.2em; }
.hint.error { color: var(--warn); }
.credit { padding: 4px 24px 10px; font-size: 11px; color: #55544e; text-align: right; }

/* Kalibrier-Panel (Tracking-Feinjustage) */
.calib { display: flex; flex-wrap: wrap; gap: 10px 26px; padding: 12px 24px; border-bottom: 1px solid var(--surface); background: #1a1916; }
.calibrow { display: flex; flex-direction: column; gap: 3px; min-width: 210px; }
.calibrow > label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.calibrow .r { display: flex; align-items: center; gap: 10px; }
.calibrow input[type="range"] { flex: 1; accent-color: var(--accent); min-width: 120px; }
.calibrow .cval { font-size: 12px; color: var(--fg); font-variant-numeric: tabular-nums; min-width: 84px; text-align: right; }
.calib .note { flex-basis: 100%; font-size: 12px; color: var(--muted); margin: 0; }
.calib .actions { display: flex; align-items: flex-end; }

/* Speichern/Prüf-Panel (Aufnahme als Datei[en]) */
.savep { padding: 12px 24px; border-bottom: 1px solid var(--surface); background: #1a1916; display: flex; flex-direction: column; gap: 10px; }
.savep .saverow { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.savep .slbl { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.savep .seg { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 6px 0; border-top: 1px solid var(--surface); }
.savep .seg.unsure { opacity: .7; }
.savep .seg .ix { font-size: 12px; color: var(--muted); width: 1.6em; text-align: right; }
.savep .seg .meta { font-size: 13px; color: var(--fg); font-variant-numeric: tabular-nums; min-width: 230px; }
.savep .seg .meta .q { color: var(--warn); }
.savep .seg input[type="text"] { flex: 1; min-width: 150px; background: var(--surface); color: var(--fg); border: 1px solid var(--surface-hi); border-radius: 6px; padding: 6px 8px; font-size: 13px; }
.savep .saveactions { display: flex; gap: 10px; flex-wrap: wrap; }
.savep .note { font-size: 12px; color: var(--muted); margin: 0; }

/* Kompaktere Darstellung auf schmalen Bildschirmen (Handy) */
@media (max-width: 600px) {
  header { flex-direction: column; align-items: flex-start; gap: 1px; padding: 8px 14px; }
  header h1 { font-size: 16px; }
  header .sub { font-size: 11px; line-height: 1.25; }
  .controls { padding: 8px 14px; gap: 7px 12px; }
  .field { gap: 2px; }
  .field label { font-size: 10px; }
  select, input[type="number"] { padding: 5px 8px; font-size: 13px; }
  select { min-width: 0; }
  .field .row { gap: 6px; }
  button.ghost { padding: 5px 9px; font-size: 12px; }
  button#startBtn { padding: 7px 18px; font-size: 14px; border-radius: 6px; }
  main { padding: 10px; }
  .bpm { font-size: clamp(56px, 22vw, 150px); }
  .bpm.notes { font-size: clamp(30px, 8vw, 72px); }
  .key { font-size: clamp(32px, 8vw, 64px); }
  .keyblock { margin-top: 14px; }
  .raw, .status { font-size: 13px; }
  .raw { margin-top: 6px; }
  .level { margin-top: 12px; }
  .hint { padding: 7px 14px; font-size: 12px; }
  .credit { padding: 2px 14px 7px; }
}
</style>
</head>
<body>
  <header>
    <h1>Audio2Midi</h1>
    <span class="sub">BPM-Erkennung mit MIDI-Clock, Tonerkennung mit Midi-Ausgabe und Tonarterkennung &middot; Webversion</span>
  </header>

  <section class="controls">
    <div class="field">
      <label for="opMode">Modus</label>
      <select id="opMode">
        <option value="clock">Tempo &amp; MIDI-Clock</option>
        <option value="file">Datei/Aufnahme → MIDI-Clock (driftfrei)</option>
        <option value="mono">Noten → MIDI (monophon)</option>
        <option value="poly">Noten → MIDI (polyphon)</option>
        <option value="chord">Noten → MIDI (Akkorde)</option>
      </select>
    </div>
    <div class="field" id="srcField">
      <label for="srcMode">Quelle</label>
      <select id="srcMode">
        <option value="input">Audio-Eingang (Mikrofon/Line-In)</option>
        <option value="display">Wiedergabe mithören (Tab/System)</option>
      </select>
    </div>
    <div class="field" id="inField">
      <label for="audioIn">Audio-Eingang</label>
      <div class="row">
        <select id="audioIn"></select>
        <button id="loadInputs" class="ghost"
                title="Mikrofon freigeben, damit alle Eingaenge mit Namen erscheinen">
          Eingänge laden
        </button>
      </div>
    </div>
    <div class="field" id="fileField" style="display:none">
      <label for="audioFile">Audio (Datei oder Aufnahme)</label>
      <div class="row">
        <button id="fileBtn" class="ghost">Datei wählen…</button>
        <span id="fileNameLbl" class="filelbl">keine Datei</span>
      </div>
      <input type="file" id="audioFile" accept="audio/*" style="display:none">
    </div>
    <div class="field" id="recField" style="display:none">
      <label>Aufnahme</label>
      <div class="row">
        <button id="recArm" class="ghost"
                title="Aufnahme-Quelle bereitstellen (Tab/System oder Eingang) – vor der Aufnahme">Quelle bereitstellen</button>
        <button id="recToggle" class="ghost" disabled title="Aufnahme manuell starten/stoppen">● Start</button>
        <button id="recSave" class="ghost" disabled title="Aufnahme als Datei(en) speichern">Speichern…</button>
      </div>
    </div>
    <div class="field">
      <label for="midiOut">MIDI-Ausgang</label>
      <select id="midiOut"></select>
    </div>
    <div class="field">
      <label>BPM-Bereich</label>
      <div class="range">
        <input type="number" id="minBpm" value="70" min="30" max="300" step="1">
        <span>–</span>
        <input type="number" id="maxBpm" value="140" min="30" max="300" step="1">
      </div>
    </div>
    <div class="field" id="keyField">
      <label>Tonart</label>
      <button id="keyToggle" class="ghost"
              title="Grundtonart (mit Paralleltonart) anzeigen">anzeigen</button>
    </div>
    <div class="field" id="syncField">
      <label for="beatSync">Beat-Sync</label>
      <label class="chk" title="Clock regelmäßig auf den erkannten Beat nachführen (gegen Drift). Bei undeutlichem Beat läuft sie frei weiter.">
        <input type="checkbox" id="beatSync" checked> auf Beat
      </label>
    </div>
    <div class="field">
      <label for="startStop">MIDI Start/Stop</label>
      <label class="chk" title="MIDI Start/Stop senden? Aus = nur durchgehende Clock; du startest dein Gerät selbst.">
        <input type="checkbox" id="startStop"> senden
      </label>
    </div>
    <div class="field" id="octField">
      <label for="octave">Oktave ±</label>
      <input type="number" id="octave" value="0" min="-4" max="4" step="1"
             title="Erkannte Noten für die MIDI-Ausgabe um N Oktaven verschieben">
    </div>
    <div class="field" id="calibField" style="display:none">
      <label>Kalibrierung</label>
      <button id="calibToggle" class="ghost"
              title="Tracking feinjustieren (Schwellen, Latenz, Reaktion)">anzeigen</button>
    </div>
    <button id="startBtn">Start</button>
  </section>

  <section class="calib" id="calibPanel" style="display:none">
    <div class="calibrow" data-modes="mono poly chord">
      <label for="cLatency">Latenz (Audioblock)</label>
      <div class="r"><input type="range" id="cLatency" min="0" max="3" step="1" value="1"><span class="cval" id="cLatencyV">512</span></div>
    </div>
    <div class="calibrow" data-modes="mono poly chord">
      <label for="cSilence">Anschlag-Schwelle</label>
      <div class="r"><input type="range" id="cSilence" min="-66" max="-30" step="1" value="-48"><span class="cval" id="cSilenceV">-48 dB</span></div>
    </div>
    <div class="calibrow" data-modes="mono chord">
      <label for="cSustain">Halte-Schwelle</label>
      <div class="r"><input type="range" id="cSustain" min="-78" max="-40" step="1" value="-56"><span class="cval" id="cSustainV">-56 dB</span></div>
    </div>
    <div class="calibrow" data-modes="mono chord">
      <label for="cOff">Note-Aus-Verzögerung</label>
      <div class="r"><input type="range" id="cOff" min="1" max="12" step="1" value="3"><span class="cval" id="cOffV">3</span></div>
    </div>
    <div class="calibrow" data-modes="mono">
      <label for="cYin">YIN-Schwelle (Tonhöhe)</label>
      <div class="r"><input type="range" id="cYin" min="0.05" max="0.30" step="0.01" value="0.15"><span class="cval" id="cYinV">0.15</span></div>
    </div>
    <div class="calibrow" data-modes="mono chord">
      <label for="cChange">Wechsel-Reaktion</label>
      <div class="r"><input type="range" id="cChange" min="1" max="6" step="1" value="2"><span class="cval" id="cChangeV">2</span></div>
    </div>
    <div class="field actions">
      <button id="calibReset" class="ghost">Zurücksetzen</button>
    </div>
    <p class="note" id="calibNote"></p>
  </section>

  <section class="savep" id="savePanel" style="display:none">
    <div class="saverow">
      <span class="slbl">Format</span>
      <label class="chk"><input type="radio" name="savefmt" id="fmtWav" value="wav" checked> WAV (unkomprimiert)</label>
      <label class="chk"><input type="radio" name="savefmt" id="fmtWebm" value="webm"> WebM-Original (nur ganze Aufnahme)</label>
    </div>
    <div id="segList"></div>
    <div class="saveactions">
      <button id="saveAll" class="ghost on">Alle speichern</button>
      <button id="mergeAll" class="ghost">Als ein Stück</button>
      <button id="splitTime" class="ghost">Nach Zeit trennen…</button>
      <button id="saveClose" class="ghost">Schließen</button>
    </div>
    <p class="note" id="saveNote"></p>
  </section>

  <main>
    <div class="bpm idle" id="bpm">—</div>
    <div class="cap" id="bpmCap">BPM</div>
    <div class="raw" id="raw">roh: —</div>
    <div class="status" id="status">bereit</div>
    <div class="keyblock" id="keyBlock" style="display:none">
      <div class="key"><span id="keyName" class="idle">—</span><span class="par" id="keyPar"></span></div>
      <div class="cap">TONART</div>
    </div>
    <div class="level">
      <span class="lbl">PEGEL</span>
      <div class="track"><div id="levelBar"></div></div>
      <span class="db" id="db">-60 dB</span>
    </div>
  </main>

  <div class="hint" id="hint"></div>
  <div class="credit">codekoch / claude</div>

<script>
"use strict";

// ===========================================================================
// Stellschrauben (mirror der Python-Konstanten)
// ===========================================================================
const WINDOW_SECONDS   = 8.0;
const FFT_SIZE         = 2048;
const HOP_SIZE         = 512;
const TEMPO_PRIOR_OCT  = 0.9;
const CONF_RATIO       = 1.45;
const MIN_ONSET_SUM    = 1e-3;

const ANALYSIS_INTERVAL = 0.5;   // haeufiger analysieren -> erste BPM frueher + schnellere Stabilisierung
const BPM_MEDIAN_LEN    = 16;
const SILENCE_DB        = -55.0;
const DEFAULT_MIN_BPM   = 70;
const DEFAULT_MAX_BPM   = 140;

// Tonart (Sha'ath-Profile, Konstanten wie im Python-Kern)
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const KS_MAJOR = [6.6,2.0,3.5,2.3,4.6,4.0,2.5,5.2,2.4,3.7,2.3,3.4];
const KS_MINOR = [6.5,2.7,3.5,5.4,2.6,3.5,2.5,5.2,4.0,2.7,4.3,3.2];
const BASS_TONIC_WEIGHT    = 0.30;
const CHROMA_LOG_COMP      = 10.0;
const KEY_EMA_SEC          = 15.0;
const KEY_SWITCH_CONFIRM   = 2;
const KEY_CONFIDENT_MARGIN = 0.12;
const KEY_CONFIDENT_MIN_N  = 16;

const PPQN          = 24;
const LOOKAHEAD_MS  = 120;
const TICK_MS       = 25;
const SLEW_BPM_PER_S = 8.0;
const DEADBAND_BPM  = 0.15;
const MSG_CLOCK = 0xF8, MSG_START = 0xFA, MSG_STOP = 0xFC;
// Beat-Phasenkopplung: die Clock laeuft im aus den Beats GEMESSENEN Song-Tempo
// (kein Drift durch Tempo-Schaetzfehler) und zieht die Beat-Phase zusaetzlich
// sanft aufs Song-Raster (Proportional-Nachregelung).
const BEAT_PLL_GAIN     = 0.10;   // Phasen-Anteil pro Beat
const BEAT_MAX_NUDGE_MS = 6.0;    // max. Phasenkorrektur pro Beat (kein hoerbarer Sprung)
const BEAT_VALID_MS     = 4000;   // so lange gilt ein Beat-Anker als aktuell
const BEAT_MIN_COH      = 0.18;   // Mindest-Phasenkohaerenz der Onset-Faltung, sonst kein Sync (kein Reissen bei undeutlichem Beat)

// Datei-Modus: Offline-Beat-Map -> driftfreie Clock gegen die Wiedergabe.
const FILE_TIGHTNESS         = 100;    // DP-Beat-Tracker: Bindung der Beat-Abstaende ans (lokale) Tempo
const FILE_LEAD_S            = 0.18;   // Vorlauf vor dem Wiedergabestart (Audio + Scheduler einschwingen)
const FILE_SCHED_INTERVAL_MS = 25;     // Scheduler-Takt
const FILE_SCHED_LOOKAHEAD_S = 0.12;   // so weit im Voraus werden Ticks terminiert
const FILE_CONST_DRIFT       = 0.015;  // <=1,5% Tempo-Unterschied 1./2. Haelfte -> "konstant" -> perfektes Raster
const FILE_FOLD_REL          = 0.006;  // Feinsuche der Periode: +-0,6% um den Median-Beat-Abstand
const FILE_FOLD_MIN_R        = 0.45;   // ab dieser Phasenkohaerenz wird die verfeinerte Periode genutzt
const SONG_GAP_S             = 1.2;    // Stille-Laenge (s), ab der eine Stueck-Grenze vermutet wird
const SONG_MIN_S             = 15;     // kuerzere Segmente werden zum Nachbarn gemerged

// Noten-Modus (Pitch -> MIDI)
const NOTE_CH          = 0;       // MIDI-Kanal 1
const NOTE_MIN_MIDI    = 36;      // C2
const NOTE_MAX_MIDI    = 96;      // C7
const NOTE_SILENCE_RMS = 0.004;   // ~ -48 dBFS: darunter startet keine neue Note
const NOTE_SUSTAIN_RMS = 0.0015;  // gehaltene Note bleibt an, solange Pegel darueber (Ausklingen)
const NOTE_OFF_FRAMES  = 3;       // so viele wirklich leise Frames vor Note Off (entprellt)
const YIN_THRESHOLD    = 0.15;    // YIN-Schwelle (kleiner = strenger)
const POLY_HARMONICS   = 8;       // so viele Obertoene gehen in die Salienz ein
const POLY_REL_THRESH  = 0.34;    // weitere Note nur, wenn Salienz >= Anteil der staerksten
const POLY_CANCEL_BINS = 3;       // +/- Bins, die je Oberton geloescht werden
const NOTE_MAX_POLY    = 5;       // max. gleichzeitige Noten

// Akkord-Modus (erkannter Akkord -> sauberer MIDI-Akkord, Fehltoene weggefiltert)
const CHORD_MIN_SCORE  = 0.74;    // Mindest-Aehnlichkeit (Cosinus) Chroma<->Akkord-Template
const CHORD_MIN_MARGIN = 0.02;    // Mindestabstand zum besten Akkord mit anderem Grundton (sonst kein klarer Akkord)
const CHORD_ROOT_W     = 1.4;     // Grundton im Template staerker gewichten (Bass-Evidenz)
const CHORD_CONFIRM    = 3;       // Frames zur Bestaetigung eines NEUEN Akkords (reitet die Fenster-Mischphase beim Wechsel aus)
const CHORD_OFF_FRAMES = 6;       // leise Frames bis Akkord-Off (Akkorde klingen laenger aus)
const CHORD_EMA        = 0.5;     // Glaettung des Chroma ueber Frames (Stabilitaet bei gehaltenem Akkord)
const CHORD_FMIN       = 70;      // Chroma nur aus diesem Frequenzbereich -> Grundtoene, weniger Oberton-Mulm
const CHORD_FMAX       = 1100;

// ===========================================================================
// Radix-2-FFT (in-place)
// ===========================================================================
class FFT {
  constructor(n) {
    this.n = n;
    this.cos = new Float32Array(n / 2);
    this.sin = new Float32Array(n / 2);
    for (let i = 0; i < n / 2; i++) {
      this.cos[i] = Math.cos(-2 * Math.PI * i / n);
      this.sin[i] = Math.sin(-2 * Math.PI * i / n);
    }
    const bits = Math.round(Math.log2(n));
    this.rev = new Uint32Array(n);
    for (let i = 0; i < n; i++) {
      let x = i, r = 0;
      for (let j = 0; j < bits; j++) { r = (r << 1) | (x & 1); x >>= 1; }
      this.rev[i] = r >>> 0;
    }
  }
  transform(re, im) {
    const n = this.n, rev = this.rev;
    for (let i = 0; i < n; i++) {
      const j = rev[i];
      if (j > i) { let t = re[i]; re[i] = re[j]; re[j] = t; t = im[i]; im[i] = im[j]; im[j] = t; }
    }
    for (let size = 2; size <= n; size <<= 1) {
      const half = size >> 1, step = (n / size) | 0;
      for (let i = 0; i < n; i += size) {
        for (let k = 0; k < half; k++) {
          const ci = k * step, c = this.cos[ci], s = this.sin[ci];
          const a = i + k, b = a + half;
          const tre = re[b] * c - im[b] * s, tim = re[b] * s + im[b] * c;
          re[b] = re[a] - tre; im[b] = im[a] - tim;
          re[a] += tre;        im[a] += tim;
        }
      }
    }
  }
}

// ===========================================================================
// TempoAnalyzer: rollende Onset-Huellkurve -> Autokorrelation -> BPM
// ===========================================================================
class TempoAnalyzer {
  constructor(sampleRate, minBpm, maxBpm) {
    this.sr = sampleRate;
    this.minBpm = minBpm;
    this.maxBpm = maxBpm;
    this.envRate = sampleRate / HOP_SIZE;
    this.envLen = Math.round(WINDOW_SECONDS * this.envRate);
    this.centerBpm = Math.sqrt(minBpm * maxBpm);
    this.fft = new FFT(FFT_SIZE);
    this.win = new Float32Array(FFT_SIZE);
    for (let i = 0; i < FFT_SIZE; i++) {
      this.win[i] = 0.5 - 0.5 * Math.cos(2 * Math.PI * i / (FFT_SIZE - 1));
    }
    this.frame = new Float32Array(FFT_SIZE);
    this.re = new Float32Array(FFT_SIZE);
    this.im = new Float32Array(FFT_SIZE);
    this.prevMag = new Float32Array(FFT_SIZE / 2);
    this.onset = [];
    this._havePrev = false;
    // --- Tonart-Chroma ueber eine SEPARATE, groessere FFT ---
    // Bei FFT_SIZE 2048 sind die Bins (~23 Hz) im Bass/Mittenbereich groeber
    // als ein Halbton -> einzelne Tonklassen blieben leer ("Loecher"). Eine
    // groessere FFT (16384 ~ 0,34 s -> ~3-Hz-Bins) gibt eine saubere Ton-
    // klassen-Zuordnung. Wird nur ~1x/s ausgewertet (computeChroma).
    this.NC = 16384;
    this.fftC = new FFT(this.NC);
    this.winC = new Float32Array(this.NC);
    for (let i = 0; i < this.NC; i++) {
      this.winC[i] = 0.5 - 0.5 * Math.cos(2 * Math.PI * i / (this.NC - 1));
    }
    this.cbuf = new Float32Array(this.NC);   // rollender Sample-Puffer
    this.cbufFilled = 0;
    this.reC = new Float32Array(this.NC);
    this.imC = new Float32Array(this.NC);
    const halfC = this.NC / 2;
    this.binPc = new Int8Array(halfC);       // Bin -> Tonklasse (0=C), -1=ignorieren
    this.binBass = new Uint8Array(halfC);    // Bin im Bassbereich? (Grundton-Evidenz)
    for (let k = 1; k < halfC; k++) {
      const f = k * sampleRate / this.NC;
      if (f < 55 || f > 5000) { this.binPc[k] = -1; continue; }
      const midi = Math.round(69 + 12 * Math.log2(f / 440));
      this.binPc[k] = ((midi % 12) + 12) % 12;
      this.binBass[k] = (f >= 55 && f <= 260) ? 1 : 0;   // ~A1..C4
    }
    this.binPc[0] = -1;
  }
  pushChunk(chunk) {
    // Samples zusaetzlich in den groesseren Chroma-Puffer schieben.
    this.cbuf.copyWithin(0, HOP_SIZE);
    this.cbuf.set(chunk, this.NC - HOP_SIZE);
    if (this.cbufFilled < this.NC) this.cbufFilled += HOP_SIZE;

    this.frame.copyWithin(0, HOP_SIZE);
    this.frame.set(chunk, FFT_SIZE - HOP_SIZE);
    const re = this.re, im = this.im, win = this.win;
    for (let i = 0; i < FFT_SIZE; i++) { re[i] = this.frame[i] * win[i]; im[i] = 0; }
    this.fft.transform(re, im);
    const half = FFT_SIZE / 2;
    let flux = 0;
    const prev = this.prevMag;
    for (let k = 0; k < half; k++) {
      const mag = Math.hypot(re[k], im[k]);
      const d = mag - prev[k];
      if (d > 0) flux += d;
      prev[k] = mag;
    }
    if (this._havePrev) {
      this.onset.push(flux);
      if (this.onset.length > this.envLen) {
        this.onset.splice(0, this.onset.length - this.envLen);
      }
    }
    this._havePrev = true;
  }
  // Chroma (pcp + bass, je auf Summe 1, log-komprimiert) aus dem aktuellen
  // Sample-Puffer ueber die grosse FFT berechnen. null, solange der Puffer
  // noch nicht voll ist (~0,34 s nach Start).
  computeChroma() {
    if (this.cbufFilled < this.NC) return null;
    const re = this.reC, im = this.imC, win = this.winC;
    for (let i = 0; i < this.NC; i++) { re[i] = this.cbuf[i] * win[i]; im[i] = 0; }
    this.fftC.transform(re, im);
    const halfC = this.NC / 2;
    const c = new Float32Array(12), bas = new Float32Array(12);
    const bpc = this.binPc, bbs = this.binBass;
    for (let k = 1; k < halfC; k++) {
      const pc = bpc[k];
      if (pc < 0) continue;
      const mag = Math.hypot(re[k], im[k]);
      c[pc] += mag;
      if (bbs[k]) bas[pc] += mag;
    }
    const pcp = chromaNorm(c);
    const bass = chromaNorm(bas);
    return pcp ? { pcp, bass: bass || new Float32Array(12) } : null;
  }
  estimate() {
    const e = this.onset, L = e.length;
    if (L < this.envRate * 0.9) return null;     // ~0,9 s Mindestfenster -> erste BPM erscheint frueh.
                                                 // Unsichere/instabile Schaetzungen filtert ohnehin CONF_RATIO weiter unten,
                                                 // d. h. bei undeutlichem Beat wartet die Anzeige automatisch laenger.
    let mean = 0;
    for (let i = 0; i < L; i++) mean += e[i];
    mean /= L;
    if (mean < MIN_ONSET_SUM) return null;
    const x = new Float32Array(L);
    let energy = 0;
    for (let i = 0; i < L; i++) { x[i] = e[i] - mean; energy += x[i] * x[i]; }
    if (energy <= 0) return null;
    const lagMin = Math.max(2, Math.floor(60 * this.envRate / this.maxBpm));
    const lagMax = Math.min(L - 2, Math.ceil(60 * this.envRate / this.minBpm));
    if (lagMax <= lagMin) return null;
    const acfMax = Math.min(L - 2, lagMax * 4);
    const acf = new Float32Array(acfMax + 1);
    for (let lag = lagMin; lag <= acfMax; lag++) {
      let s = 0;
      for (let i = 0; i + lag < L; i++) s += x[i] * x[i + lag];
      acf[lag] = s / energy;
    }
    const harmW = [1.0, 0.6, 0.4, 0.25];
    let best = -Infinity, bestLag = -1, scoreSum = 0, scoreCnt = 0;
    const priorW = TEMPO_PRIOR_OCT;
    for (let lag = lagMin; lag <= lagMax; lag++) {
      let comb = 0;
      for (let h = 1; h <= 4; h++) { const hl = lag * h; if (hl <= acfMax) comb += harmW[h - 1] * acf[hl]; }
      const bpm = 60 * this.envRate / lag;
      const lo = Math.log2(bpm / this.centerBpm) / priorW;
      const prior = Math.exp(-0.5 * lo * lo);
      const score = comb * prior;
      scoreSum += score; scoreCnt++;
      if (score > best) { best = score; bestLag = lag; }
    }
    if (bestLag < 0) return null;
    const meanScore = scoreSum / Math.max(1, scoreCnt);
    const ratio = meanScore > 0 ? best / meanScore : 0;
    if (best <= 0 || ratio < CONF_RATIO) return null;
    let lag = bestLag;
    const y0 = acf[bestLag - 1], y1 = acf[bestLag], y2 = acf[bestLag + 1];
    const denom = (y0 - 2 * y1 + y2);
    if (denom !== 0) { const delta = 0.5 * (y0 - y2) / denom; if (delta > -1 && delta < 1) lag = bestLag + delta; }
    return { bpm: 60 * this.envRate / lag, conf: ratio };
  }
  // Beat-Phase: Abstand (in Sekunden) vom Ende der Huellkurve zum letzten Beat.
  // Sucht die Phase, bei der ein Puls-Raster im Beat-Abstand am besten auf die
  // Onset-Spitzen faellt. null, wenn zu wenig Daten. Der konstante Mess-Versatz
  // (Eingangslatenz) ist egal -- entscheidend ist, dass kein Drift entsteht.
  beatPhase(bpm) {
    const e = this.onset, L = e.length;
    if (L < this.envRate * 2 || bpm <= 0) return null;
    const P = 60 * this.envRate / bpm;          // Beat-Periode in Frames
    if (P < 2) return null;
    let mean = 0; for (let i = 0; i < L; i++) mean += e[i]; mean /= L;
    const steps = Math.max(12, Math.round(P));
    let bestOff = 0, bestScore = -Infinity;
    for (let s = 0; s < steps; s++) {
      const off = s * P / steps;
      let score = 0;
      for (let k = 0; ; k++) {
        const idx = Math.round(L - 1 - off - k * P);
        if (idx < 0) break;
        const v = e[idx] - mean;
        if (v > 0) score += v;                  // halbweg-gleichgerichtet
      }
      if (score > bestScore) { bestScore = score; bestOff = off; }
    }
    return bestOff / this.envRate;              // Sekunden seit letztem Beat
  }
  // Beat-Raster fuer die Phasenkopplung der Clock: faltet die rollende Onset-
  // Huellkurve eng um das Tempo (Phasen-Kohaerenz, wie im Datei-Modus). Liefert
  // verfeinerte Periode + Phase (Sekunden seit letztem Beat) + Guete (0..1).
  // Robuster als die Einzelfenster-Kammsuche -- nur bei hoher Guete einrasten.
  beatGrid(bpm) {
    const e = this.onset, L = e.length;
    if (!(bpm > 0) || L < this.envRate * 3) return null;     // >= ~3 s Historie
    let mean = 0; for (let i = 0; i < L; i++) mean += e[i]; mean /= L;
    let denom = 0; for (let i = 0; i < L; i++) { const w = e[i] - mean; if (w > 0) denom += w; }
    if (denom <= 0) return null;
    const P0 = 60 * this.envRate / bpm;                      // Periode in Frames
    const coh = (P) => {
      let sc = 0, ss = 0;
      for (let i = 0; i < L; i++) { const w = e[i] - mean; if (w <= 0) continue; const a = 2 * Math.PI * i / P; sc += w * Math.cos(a); ss += w * Math.sin(a); }
      return [Math.hypot(sc, ss) / denom, Math.atan2(ss, sc)];
    };
    let lo = P0 * 0.97, hi = P0 * 1.03, bestP = P0, bestR = -1, bestAng = 0;
    for (let pass = 0; pass < 2; pass++) {                    // grob -> fein um das Maximum
      const steps = 60;
      for (let s = 0; s <= steps; s++) { const P = lo + (hi - lo) * s / steps; const r = coh(P); if (r[0] > bestR) { bestR = r[0]; bestP = P; bestAng = r[1]; } }
      const span = (hi - lo) / steps * 3; lo = bestP - span; hi = bestP + span;
    }
    let phase0 = (bestAng / (2 * Math.PI)) * bestP; phase0 = ((phase0 % bestP) + bestP) % bestP;
    const lastIdx = L - 1;
    const k = Math.floor((lastIdx - phase0) / bestP);
    const offFrames = lastIdx - (phase0 + k * bestP);        // Frames seit letztem Beat (0..bestP)
    return { offSec: offFrames / this.envRate, periodSec: bestP / this.envRate, coherence: bestR };
  }
}

// ===========================================================================
// Tonart-Bestimmung (Sha'ath-Profile, Bass-Evidenz) -- portiert aus
// classify_key() im Python-Kern.
// ===========================================================================
function chromaNorm(v) {
  let s = 0; for (let i = 0; i < 12; i++) s += v[i];
  if (s <= 0) return null;
  const out = new Float32Array(12);
  let s2 = 0;
  for (let i = 0; i < 12; i++) { out[i] = Math.log1p(CHROMA_LOG_COMP * (v[i] / s)); s2 += out[i]; }
  if (s2 > 0) for (let i = 0; i < 12; i++) out[i] /= s2;
  return out;
}
// Pearson-Korrelation von pcp mit dem um i rotierten Profil (Grundton -> i):
// rotiertes Profil r[j] = prof[(j - i) mod 12].
function profCorr(pcp, prof, i) {
  let ma = 0, mb = 0;
  for (let j = 0; j < 12; j++) { ma += pcp[j]; mb += prof[j]; }
  ma /= 12; mb /= 12;
  let num = 0, da = 0, db = 0;
  for (let j = 0; j < 12; j++) {
    const pj = prof[((j - i) % 12 + 12) % 12];
    const xa = pcp[j] - ma, xb = pj - mb;
    num += xa * xb; da += xa * xa; db += xb * xb;
  }
  const den = Math.sqrt(da * db);
  return den > 0 ? num / den : 0;
}
function classifyKey(pcp, bass) {
  const useBass = bass && bass.some(v => v > 0);
  const scores = [];
  for (let i = 0; i < 12; i++) {
    let bonus = 0;
    if (useBass) bonus = BASS_TONIC_WEIGHT * (bass[i] + 0.5 * bass[(i + 7) % 12]);
    scores.push([profCorr(pcp, KS_MAJOR, i) + bonus, NOTE_NAMES[i] + ' Dur']);
    scores.push([profCorr(pcp, KS_MINOR, i) + bonus, NOTE_NAMES[i] + ' Moll']);
  }
  scores.sort((a, b) => b[0] - a[0]);
  return { name: scores[0][1], margin: scores[0][0] - scores[1][0], second: scores[1][1] };
}
// Paralleltonart (relative Tonart): C-Dur <-> a-Moll usw.
function parallelKey(key) {
  const p = key.split(' ');
  if (p.length !== 2) return '';
  const i = NOTE_NAMES.indexOf(p[0]);
  if (i < 0) return '';
  if (p[1] === 'Dur')  return NOTE_NAMES[(i + 9) % 12] + ' Moll';
  if (p[1] === 'Moll') return NOTE_NAMES[(i + 3) % 12] + ' Dur';
  return '';
}

// ===========================================================================
// MidiClock -- 24 PPQN, Ticks per send(timestamp) im Voraus geplant.
// Scheduler-Timer hier im Hauptthread (kein Blob-Worker -> file://-tauglich).
// ===========================================================================
class MidiClock {
  constructor() {
    this.output = null;
    this.enabled = false;
    this.targetBpm = null;
    this.curBpm = 120;
    this.running = false;
    this.nextTick = 0;
    this.tickInBeat = 0;          // 0..23; Tick 0 ist ein Beat
    this._lastSched = 0;
    this.sendStartStop = false;   // MIDI Start/Stop senden? (Standard: nein)
    // Beat-Phasenkopplung
    this.anchor = 0;              // geglaettete performance.now-Zeit eines Song-Beats (ms)
    this.period = 0;              // Beat-Abstand fuers Grid = verfeinerte Periode (ms)
    this.anchorTime = 0;          // wann der Anker zuletzt aktualisiert wurde
    this.anchorValid = false;
    this.refPeriod = 0;           // aus aufeinanderfolgenden Beats gemessene Periode
    this.refAnchor = 0;           // letzter gemeldeter echter Beat (fuer die Messung)
    this._timer = setInterval(() => this._schedule(), TICK_MS);
  }
  setOutput(output) {
    if (this.output === output) return;
    if (this.running && this.sendStartStop) this._send(MSG_STOP);
    this.running = false;
    this.output = output;
  }
  enable() {
    if (this.enabled) return;
    this.enabled = true;
    this._lastSched = performance.now();
  }
  disable() {
    this.enabled = false;
    if (this.running && this.sendStartStop) this._send(MSG_STOP);
    this.running = false;
    this.anchorValid = false;
  }
  setTargetBpm(bpm) { this.targetBpm = bpm; }
  // Beat-Kopplung sofort loesen (Beat-Sync aus): Clock laeuft frei im Tempo weiter.
  clearBeat() { this.anchorValid = false; this.refPeriod = 0; }
  // Song-Beat-Raster melden: anchorMs = Zeit eines Beats, periodMs = Beat-Abstand.
  // Der Anker wird leicht geglaettet (auf das vorige Raster projiziert + EMA).
  setBeat(anchorMs, periodMs) {
    if (!(periodMs > 0)) return;
    const now = performance.now();
    const fresh = this.anchorValid && (now - this.anchorTime) < BEAT_VALID_MS;
    // Echte Beat-Periode aus dem Abstand zweier gemessener Beats verfeinern --
    // genauer als die Tempo-Schaetzung, daher laeuft die Clock im Song-Tempo
    // und driftet nicht weg.
    if (fresh && this.refPeriod > 0) {
      const dt = anchorMs - this.refAnchor;
      const beats = Math.round(dt / this.refPeriod);
      if (beats >= 1 && beats <= 8) {
        const measured = dt / beats;
        if (measured > periodMs * 0.6 && measured < periodMs * 1.6) {
          this.refPeriod += 0.35 * (measured - this.refPeriod);
        }
      }
    } else {
      this.refPeriod = periodMs;
    }
    this.refAnchor = anchorMs;
    // Anker fuers Grid auf die verfeinerte Periode projizieren + glaetten.
    if (fresh && this.period > 0) {
      const m = Math.round((anchorMs - this.anchor) / this.refPeriod);
      const proj = this.anchor + m * this.refPeriod;
      this.anchor = proj + 0.4 * (anchorMs - proj);
    } else {
      this.anchor = anchorMs;
    }
    this.period = this.refPeriod;
    this.anchorTime = now;
    this.anchorValid = true;
  }
  _beatActive(now) {
    return this.anchorValid && this.period > 0 && (now - this.anchorTime) < BEAT_VALID_MS;
  }
  _send(status, timestamp) {
    if (!this.output) return;
    try {
      if (timestamp === undefined) this.output.send([status]);
      else this.output.send([status], timestamp);
    } catch (e) { /* Port verschwunden o.ae. */ }
  }
  _schedule() {
    if (!this.enabled) return;
    const now = performance.now();
    const dt = Math.max(0, (now - this._lastSched) / 1000);
    this._lastSched = now;
    const haveTempo = this.targetBpm != null;

    if (!this.running) {
      if (!haveTempo) return;                 // auf erste Tempo-Schaetzung warten
      this.running = true;
      this.curBpm = this.targetBpm;
      this.tickInBeat = 0;
      // ersten Tick (Beat) auf den naechsten Song-Beat legen, falls bekannt
      if (this._beatActive(now)) {
        const m = Math.ceil((now + 20 - this.anchor) / this.period);
        this.nextTick = this.anchor + m * this.period;
      } else {
        this.nextTick = now + 20;
      }
      if (this.sendStartStop) this._send(MSG_START);
    } else if (haveTempo) {
      const diff = this.targetBpm - this.curBpm;
      if (Math.abs(diff) > DEADBAND_BPM) {
        const maxStep = SLEW_BPM_PER_S * dt;
        this.curBpm += Math.max(-maxStep, Math.min(maxStep, diff));
      }
    } else if (this.sendStartStop) {
      this._send(MSG_STOP); this.running = false; return;
    }
    // ohne Start/Stop bei Stille: einfach mit letztem Tempo weiterticken.

    if (this.nextTick < now - LOOKAHEAD_MS) this.nextTick = now;
    const horizon = now + LOOKAHEAD_MS;
    while (this.nextTick < horizon) {
      // Phase: Beat-Tick (Tick 0) sanft aufs Song-Raster ziehen.
      if (this.tickInBeat === 0 && this._beatActive(now)) {
        const m = Math.round((this.nextTick - this.anchor) / this.period);
        const err = (this.anchor + m * this.period) - this.nextTick;   // ms; >0 = Song-Beat spaeter
        if (Math.abs(err) < this.period * 0.45) {     // Halbbeat-Slips ignorieren
          this.nextTick += Math.max(-BEAT_MAX_NUDGE_MS,
                                    Math.min(BEAT_MAX_NUDGE_MS, err * BEAT_PLL_GAIN));
        }
      }
      // Tempo: bei aktivem Beat die GEMESSENE Song-Periode (kein Drift),
      // sonst das geschaetzte/geslewte Tempo.
      const eff = (this._beatActive(now) && this.refPeriod > 0)
        ? Math.max(20, 60000 / this.refPeriod)
        : Math.max(20, this.curBpm);
      this._send(MSG_CLOCK, this.nextTick);
      this.nextTick += 60000 / (eff * PPQN);
      this.tickInBeat = (this.tickInBeat + 1) % PPQN;
    }
  }
}

// ===========================================================================
// Noten-Modus: Pitch -> MIDI (monophon: YIN, polyphon: FFT-Peaks)
// ===========================================================================
function midiName(m) {
  return NOTE_NAMES[((m % 12) + 12) % 12] + (Math.floor(m / 12) - 1);
}
function velFromLevel(level) {
  const db = level > 0 ? 20 * Math.log10(level) : -90;
  return Math.max(1, Math.min(127, Math.round((db + 54) / 48 * 127)));
}
// Akkord-Typen: [Suffix, Intervalle, Prior]. Der Prior bevorzugt bei
// Mehrdeutigkeit die haeufigen Dreiklaenge -- Vierklaenge (7/maj7/m7) und
// sus/dim/aug muessen sich gegen einen kleinen Abschlag durchsetzen, damit
// Oberton-Leckstrom (z. B. eine schwache Quinte->maj7) keinen Vierklang
// vortaeuscht.
const CHORD_TYPES = [
  ['',     [0, 4, 7],      1.00],   // Dur
  ['m',    [0, 3, 7],      1.00],   // Moll
  ['dim',  [0, 3, 6],      0.94],
  ['aug',  [0, 4, 8],      0.92],
  ['7',    [0, 4, 7, 10],  0.98],
  ['maj7', [0, 4, 7, 11],  0.97],
  ['m7',   [0, 3, 7, 10],  0.97],
  ['sus4', [0, 5, 7],      0.95],
  ['sus2', [0, 2, 7],      0.95],
];
// Bester Akkord zu einem 12er-Chroma (Tonklassen-Gewichte) per Cosinus-
// Aehnlichkeit gegen die Akkord-Templates -- die Standardmethode der Akkord-
// erkennung (Template-Matching, Fujishima). Der Grundton ist im Template
// staerker gewichtet (Bass-Evidenz), das stabilisiert Inversion/Mehrdeutigkeit.
// Liefert { root, typeIdx, score, margin } oder null; margin = Abstand zum
// besten Akkord mit ANDEREM Grundton (klein bei Nicht-Akkorden/Rauschen).
function bestChord(pcw) {
  let nv = 0; for (let i = 0; i < 12; i++) nv += pcw[i] * pcw[i];
  nv = Math.sqrt(nv); if (nv <= 0) return null;
  const ranked = [];
  for (let root = 0; root < 12; root++) {
    for (let ti = 0; ti < CHORD_TYPES.length; ti++) {
      const ivs = CHORD_TYPES[ti][1];
      const tpl = new Float32Array(12);
      for (const iv of ivs) tpl[(root + iv) % 12] = 1;
      tpl[root] = CHORD_ROOT_W;
      let dot = 0, tn = 0;
      for (let i = 0; i < 12; i++) { dot += tpl[i] * pcw[i]; tn += tpl[i] * tpl[i]; }
      const score = CHORD_TYPES[ti][2] * dot / (nv * Math.sqrt(tn));
      ranked.push({ root, typeIdx: ti, score });
    }
  }
  ranked.sort((a, b) => b.score - a.score);
  const best = ranked[0];
  const second = ranked.find(r => r.root !== best.root);
  best.margin = second ? best.score - second.score : best.score;
  return best;
}
// Sauberes Akkord-Voicing (Grundstellung) in dem Register, in dem gespielt
// wurde: der Grundton wird in die Oktave bei/unter der erkannten Bassnote
// gelegt, darueber die uebrigen Akkordtoene. So klingt ein tief gegriffener
// Akkord tief, ein hoher hoch -- unabhaengig von Fehltoenen.
function buildChordVoicing(root, ivs, baseMidi) {
  let rootMidi = root + 12 * Math.round((baseMidi - root) / 12);
  if (rootMidi > baseMidi) rootMidi -= 12;
  while (rootMidi < NOTE_MIN_MIDI) rootMidi += 12;
  const v = [];
  for (const iv of ivs) { let n = rootMidi + iv; while (n > NOTE_MAX_MIDI) n -= 12; v.push(n); }
  return [...new Set(v)].sort((a, b) => a - b);
}
// YIN-Tonhoehe (monophon): kumulative mittlere Differenz + Schwelle +
// Parabel-Interpolation. Rueckgabe Frequenz in Hz oder 0 (kein Ton).
function yinPitch(buf, sr, threshold) {
  const n = buf.length, maxTau = n >> 1;
  const cmnd = new Float32Array(maxTau);
  cmnd[0] = 1;
  let runningSum = 0, tauEst = -1;
  for (let tau = 1; tau < maxTau; tau++) {
    let sum = 0;
    for (let i = 0; i < maxTau; i++) { const d = buf[i] - buf[i + tau]; sum += d * d; }
    runningSum += sum;
    cmnd[tau] = runningSum > 0 ? sum * tau / runningSum : 1;
  }
  for (let tau = 2; tau < maxTau; tau++) {
    if (cmnd[tau] < threshold) {
      while (tau + 1 < maxTau && cmnd[tau + 1] < cmnd[tau]) tau++;
      tauEst = tau; break;
    }
  }
  if (tauEst === -1) return 0;
  let bt = tauEst;
  if (tauEst > 1 && tauEst + 1 < maxTau) {
    const s0 = cmnd[tauEst - 1], s1 = cmnd[tauEst], s2 = cmnd[tauEst + 1];
    const denom = 2 * (2 * s1 - s2 - s0);
    if (denom !== 0) bt = tauEst + (s2 - s0) / denom;
  }
  return bt > 0 ? sr / bt : 0;
}

class NoteEngine {
  constructor(sampleRate, mode, send) {
    this.sr = sampleRate;
    this.mode = mode;                 // 'mono' | 'poly' | 'chord'
    this.useFft = (mode === 'poly' || mode === 'chord');   // beide brauchen das Spektrum
    this.send = send;                 // (bytes[]) => void
    this.win = this.useFft ? 4096 : 2048;   // Analysefenster (Spektrum braucht mehr Aufloesung)
    this.buf = new Float32Array(this.win);
    this.filled = 0;
    this.display = '—';
    this.transpose = 0;               // Oktav-Transponierung der Ausgabe (Halbtoene)
    this.curNote = -1; this.candNote = -1; this.candN = 0; this.offCount = 0;   // mono
    this.active = new Map();          // poly: midi -> Anzahl Frames ohne Beleg
    this.chordNotes = []; this.chordRoot = -1; this.chordTypeIdx = -1; this.candKey = ''; this.chordChroma = null;   // Akkord
    // Live kalibrierbare Tracking-Parameter (Default = die globalen Konstanten;
    // das Kalibrier-Panel ueberschreibt sie zur Laufzeit).
    this.silenceRms = NOTE_SILENCE_RMS;     // Anschlag-Schwelle (neue Note/Ton startet)
    this.sustainRms = NOTE_SUSTAIN_RMS;     // Halte-Schwelle (gehaltener Ton bleibt an)
    this.offFrames = NOTE_OFF_FRAMES;       // leise Frames bis Note-Off (mono)
    this.yinThreshold = YIN_THRESHOLD;      // YIN-Schwelle (mono)
    this.changeFrames = 2;                  // Frames zur Bestaetigung eines Tonwechsels (mono)
    this.chordConfirm = CHORD_CONFIRM;      // Frames zur Bestaetigung eines neuen Akkords
    this.chordOffFrames = CHORD_OFF_FRAMES; // leise Frames bis Akkord-Off
    if (this.useFft) {
      this.fft = new FFT(this.win);
      this.re = new Float32Array(this.win);
      this.im = new Float32Array(this.win);
      this.han = new Float32Array(this.win);
      this.spec = new Float32Array(this.win >> 1);   // Betragsspektrum (Akkord-Chroma + Bass)
      for (let i = 0; i < this.win; i++) this.han[i] = 0.5 - 0.5 * Math.cos(2 * Math.PI * i / (this.win - 1));
    }
  }
  push(chunk) {
    const h = chunk.length;
    this.buf.copyWithin(0, h);
    this.buf.set(chunk, this.win - h);
    if (this.filled < this.win) this.filled += h;
  }
  process(level) {
    if (this.filled < this.win) return;
    if (this.mode === 'mono') this._mono(level);
    else if (this.mode === 'poly') this._poly(level);
    else this._chord(level);
  }
  // Note-On/Off mit Oktav-Transponierung (auf MIDI-Bereich begrenzt). Da die
  // Transponierung beim Senden angewandt wird, passen On und Off zusammen.
  _out(note) { return Math.max(0, Math.min(127, note + this.transpose)); }
  _noteOn(note, vel) { this.send([0x90 | NOTE_CH, this._out(note), vel]); }
  _noteOff(note) { this.send([0x80 | NOTE_CH, this._out(note), 0]); }
  setTranspose(semi) {
    if (semi === this.transpose) return;
    this.allOff();                 // offene Noten mit der ALTEN Transponierung beenden
    this.transpose = semi;
  }
  _mono(level) {
    let note = -1;
    // Zum HALTEN einer Note genuegt ein niedrigerer Pegel (Hysterese) -- ein
    // ausklingender Ton reisst so nicht ab und wird nicht neu getriggert.
    const gate = this.curNote !== -1 ? this.sustainRms : this.silenceRms;
    if (level > gate) {
      const f = yinPitch(this.buf, this.sr, this.yinThreshold);
      if (f > 0) {
        const m = Math.round(69 + 12 * Math.log2(f / 440));
        if (m >= NOTE_MIN_MIDI && m <= NOTE_MAX_MIDI) note = m;
      }
    }
    if (note === this.curNote && this.curNote !== -1) {   // klar gehalten
      this.offCount = 0; this.candNote = -1; this.candN = 0; return;
    }
    if (note === -1) {
      // Keine klare Tonhoehe. Klingt noch genug Pegel? -> Note halten
      // (YIN findet beim Ausklingen oft kurz nichts). Sonst nach Entprellung aus.
      if (this.curNote !== -1 && level > this.sustainRms) {
        this.offCount = 0;
      } else if (this.curNote !== -1) {
        if (++this.offCount >= this.offFrames) {
          this._noteOff(this.curNote); this.curNote = -1; this.offCount = 0; this.display = '—';
        }
      }
      this.candNote = -1; this.candN = 0;
      return;
    }
    // neuer Ton (anders als der gehaltene) -> Wechsel kurz entprellen
    this.offCount = 0;
    if (note === this.candNote) this.candN++; else { this.candNote = note; this.candN = 1; }
    const need = (this.curNote === -1) ? 1 : this.changeFrames;
    if (this.candN >= need) {
      if (this.curNote !== -1) this._noteOff(this.curNote);
      this._noteOn(note, velFromLevel(level));
      this.curNote = note; this.candNote = -1; this.candN = 0;
      this.display = midiName(this._out(note));
    }
  }
  // Salienz-Notenerkennung (poly + Akkord gemeinsam): harmonische-Summen-
  // Salienz mit iterativer Oberton-Ausloeschung. Fuer jede Kandidaten-Note wird
  // die Magnitude ihrer Obertonreihe summiert (Grundton am staerksten); die
  // staerkste Note wird akzeptiert, ihre Obertonreihe geloescht und neu gesucht
  // -- so wird ein Oberton nicht faelschlich als eigene Note erkannt. Liefert
  // die Toene als [{ m, sal }, ...] nach Salienz absteigend, ohne Note On/Off.
  _salientNotes(level) {
    const out = [];
    if (level <= this.silenceRms) return out;
    const N = this.win, re = this.re, im = this.im, han = this.han;
    for (let i = 0; i < N; i++) { re[i] = this.buf[i] * han[i]; im[i] = 0; }
    this.fft.transform(re, im);
    const half = N >> 1, spec = new Float32Array(half);
    let maxMag = 0;
    for (let k = 1; k < half; k++) { const m = Math.hypot(re[k], im[k]); spec[k] = m; if (m > maxMag) maxMag = m; }
    if (maxMag <= 0) return out;
    const nyq = this.sr / 2, scale = N / this.sr;
    const taken = new Set();
    const harmAt = (f) => {                       // Peak-Magnitude nahe f (+/-2 Bins)
      const b = Math.round(f * scale);
      const lo = Math.max(1, b - 2), hi = Math.min(half - 1, b + 2);
      let mx = 0; for (let k = lo; k <= hi; k++) if (spec[k] > mx) mx = spec[k];
      return mx;
    };
    let firstSal = 0;
    for (let iter = 0; iter < NOTE_MAX_POLY; iter++) {
      let bestM = -1, bestS = 0;
      for (let m = NOTE_MIN_MIDI; m <= NOTE_MAX_MIDI; m++) {
        if (taken.has(m)) continue;
        const f0 = 440 * Math.pow(2, (m - 69) / 12);
        if (f0 < 50 || f0 >= nyq) continue;
        let s = 0;
        for (let h = 1; h <= POLY_HARMONICS; h++) {
          const f = f0 * h; if (f >= nyq) break;
          s += harmAt(f) / h;                     // Grundton am staerksten gewichtet
        }
        if (s > bestS) { bestS = s; bestM = m; }
      }
      if (bestM < 0) break;
      if (iter === 0) firstSal = bestS;
      else if (bestS < firstSal * POLY_REL_THRESH) break;
      taken.add(bestM); out.push({ m: bestM, sal: bestS });
      const f0 = 440 * Math.pow(2, (bestM - 69) / 12);   // Obertonreihe loeschen
      for (let h = 1; h <= POLY_HARMONICS; h++) {
        const f = f0 * h; if (f >= nyq) break;
        const b = Math.round(f * scale), w = POLY_CANCEL_BINS;
        for (let k = Math.max(0, b - w); k <= Math.min(half - 1, b + w); k++) spec[k] = 0;
      }
    }
    return out;
  }
  _poly(level) {
    const detected = new Set(this._salientNotes(level).map(o => o.m));
    const vel = velFromLevel(level);
    for (const m of detected) {
      if (!this.active.has(m)) this._noteOn(m, vel);
      this.active.set(m, 0);
    }
    for (const [m, miss] of [...this.active]) {          // Note-Off mit 1 Frame Nachsicht
      if (detected.has(m)) continue;
      if (miss >= 1) { this._noteOff(m); this.active.delete(m); }
      else this.active.set(m, miss + 1);
    }
    const on = [...this.active.keys()].filter(m => this.active.get(m) === 0).sort((a, b) => a - b);
    this.display = on.length ? on.map(m => midiName(this._out(m))).join(' ') : '—';
  }
  // Chroma (12 Tonklassen-Gewichte) + Bassnote aus dem Spektrum fuer die
  // Akkorderkennung. Plain-Chroma aus dem Grundton-Bereich (CHORD_FMIN..FMAX):
  // robuster fuer Akkorde als die diskrete Notenliste (die einzelne Akkordtoene
  // verliert oder Phantomnoten erzeugt). Liefert { chroma, baseMidi } oder null.
  _chordChromaFrame() {
    const N = this.win, re = this.re, im = this.im, han = this.han, spec = this.spec;
    for (let i = 0; i < N; i++) { re[i] = this.buf[i] * han[i]; im[i] = 0; }
    this.fft.transform(re, im);
    const half = N >> 1;
    const kMin = Math.max(1, Math.floor(CHORD_FMIN * N / this.sr));
    const kMax = Math.min(half - 1, Math.ceil(CHORD_FMAX * N / this.sr));
    let gmax = 0;
    for (let k = kMin; k <= kMax; k++) { const m = Math.hypot(re[k], im[k]); spec[k] = m; if (m > gmax) gmax = m; }
    if (gmax <= 0) return null;
    const chroma = new Float32Array(12);
    for (let k = kMin; k <= kMax; k++) {
      const f = k * this.sr / N;
      const pc = (((Math.round(12 * Math.log2(f / 440) + 69)) % 12) + 12) % 12;
      chroma[pc] += spec[k];
    }
    let cm = 0; for (let i = 0; i < 12; i++) if (chroma[i] > cm) cm = chroma[i];
    if (cm <= 0) return null;
    for (let i = 0; i < 12; i++) chroma[i] /= cm;
    // Bassnote: tiefste markante Spektralspitze (>=25% Maximum) im Bassbereich.
    const kB1 = Math.min(kMax, Math.floor(420 * N / this.sr));
    let baseMidi = 52;
    for (let k = kMin + 1; k < kB1; k++) {
      if (spec[k] > 0.25 * gmax && spec[k] >= spec[k - 1] && spec[k] >= spec[k + 1]) {
        baseMidi = Math.round(12 * Math.log2((k * this.sr / N) / 440) + 69); break;
      }
    }
    return { chroma, baseMidi };
  }

  // als sauberes Voicing senden. Toene, die nicht zum Akkord gehoeren (oft nur
  // Fehlerkennungen), fallen dabei weg. Ein erkannter Akkord wird GEHALTEN, bis
  // ein anderer sicher erkannt wird oder Stille eintritt -- kein Geflacker.
  _chord(level) {
    const gate = this.chordRoot !== -1 ? this.sustainRms : this.silenceRms;
    if (level <= gate) {                          // Stille -> Akkord entprellt beenden
      if (this.chordRoot !== -1 && ++this.offCount >= this.chordOffFrames) this._chordOff();

    }

      const voicing = buildChordVoicing(match.root, CHORD_TYPES[match.typeIdx][1], fr.baseMidi);
      const vel = velFromLevel(level);
      for (const m of voicing) this._noteOn(m, vel);
      this.chordNotes = voicing; this.chordRoot = match.root; this.chordTypeIdx = match.typeIdx;
      this.candKey = ''; this.candN = 0;
      const name = NOTE_NAMES[match.root] + CHORD_TYPES[match.typeIdx][0];
      this.display = name + '  ' + voicing.map(m => midiName(this._out(m))).join(' ');
    }
  }
  _chordOff() {
    for (const m of this.chordNotes) this._noteOff(m);
    this.chordNotes = []; this.chordRoot = -1; this.chordTypeIdx = -1;
    this.offCount = 0; this.chordChroma = null; this.display = '—';
  }
  allOff() {
    if (this.curNote !== -1) { this._noteOff(this.curNote); this.curNote = -1; }

    this.active.clear();
    for (const m of this.chordNotes) this._noteOff(m);
    this.chordNotes = []; this.chordRoot = -1; this.chordTypeIdx = -1; this.candKey = ''; this.chordChroma = null;
    this.offCount = 0; this.candNote = -1; this.candN = 0;
    this.display = '—';
  }
}

// --- Web MIDI (erst bei Bedarf anfragen) ---
async function initMidi() {
  if (midiRequested) return;
  midiRequested = true;
  if (!navigator.requestMIDIAccess) {
    setHint('Web MIDI wird von diesem Browser nicht unterstuetzt. Empfohlen: Chrome, Edge oder Opera.', true);
    return;
  }
  try {
    midiAccess = await navigator.requestMIDIAccess({ sysex: false });
  } catch (e) {
    midiRequested = false;
    setHint('MIDI-Zugriff verweigert: ' + e.message, true);
    return;
  }
  refreshMidiOutputs();
  midiAccess.onstatechange = refreshMidiOutputs;
}
function refreshMidiOutputs() {
  const prev = elMidi.value;
  elMidi.innerHTML = '';
  elMidi.add(new Option('Kein MIDI (nur Anzeige)', ''));
  for (const out of midiAccess.outputs.values()) elMidi.add(new Option(out.name, out.id));
  elMidi.value = [...elMidi.options].some(o => o.value === prev) ? prev : '';
  applyMidiOutput();
}
function applyMidiOutput() {
  const id = elMidi.value;
  midiOut = id ? midiAccess.outputs.get(id) : null;
  clock.setOutput(midiOut);            // Clock und Noten-Modus nutzen denselben Port
}

function captureGranted(stream) {
  try {
    const t = stream.getAudioTracks()[0];
    if (!t) return;
    const s = t.getSettings ? t.getSettings() : {};
    if (s.deviceId) grantedDeviceId = s.deviceId;
    if (t.label) grantedLabel = t.label;
  } catch (e) {}
}

// --- Kalibrierung (Tracking-Feinjustage per Slider) ---
function dbToRms(db) { return Math.pow(10, db / 20); }

function syncCalibLabels() {
  noteBlockSize = CALIB_BLOCKS[+cLat.value];
  const ms = calibBlockMs(noteBlockSize);
  cLatV.textContent = noteBlockSize + ' · ~' + ms + ' ms';
  cSilV.textContent = (+cSil.value) + ' dB';
  cSusV.textContent = (+cSus.value) + ' dB';
  cOffV.textContent = (+cOff.value) + ' · ~' + Math.round((+cOff.value) * ms) + ' ms';
  cYinV.textContent = (+cYin.value).toFixed(2);
  cChgV.textContent = (+cChg.value) + ' · ~' + Math.round((+cChg.value) * ms) + ' ms';
}
function applyCalibToEngine(eng) {
  if (!eng) return;
  eng.silenceRms = dbToRms(+cSil.value);
  eng.sustainRms = dbToRms(+cSus.value);
  eng.yinThreshold = +cYin.value;
  if (opMode === 'chord') { eng.chordOffFrames = +cOff.value; eng.chordConfirm = +cChg.value; }
  else { eng.offFrames = +cOff.value; eng.changeFrames = +cChg.value; }
}
function loadCalibDefaults(mode) {
  cLat.value = (mode === 'chord') ? 2 : 1;   // Akkord: 1024 (stabiler), sonst 512 (geringe Latenz)
  cSil.value = -48; cSus.value = -56; cYin.value = 0.15;
  if (mode === 'chord') { cOff.value = 6; cChg.value = 3; }
  else { cOff.value = 3; cChg.value = 2; }
  syncCalibLabels();
}
function updateCalibPanel() {
  const note = (opMode === 'mono' || opMode === 'poly' || opMode === 'chord');
  elCalibField.style.display = note ? '' : 'none';
  if (!note) { elCalibPanel.style.display = 'none'; return; }
  elCalibPanel.querySelectorAll('.calibrow').forEach(row => {
    row.style.display = (row.dataset.modes || '').split(' ').includes(opMode) ? '' : 'none';
  });
  elCalibNote.textContent = 'Wirkt sofort. Kleinere Latenz = schnellere Reaktion (mehr CPU); '
    + 'sehr kleine Werte können das Tracking unruhiger machen.';

// Liefert den MediaStream je nach Quelle. 'display' nutzt die Screen-Capture-
// API (getDisplayMedia): erfasst Tab-/System-Audio. Chrome verlangt dabei
// einen Video-Track -> wir fordern ihn an, schalten ihn aber ab (enabled=false)
// und werten nur das Audio aus.
async function acquireStream(mode) {
  const audio = { echoCancellation: false, noiseSuppression: false, autoGainControl: false };
  if (mode === 'display') {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
      throw new Error('Dieser Browser kann keine Wiedergabe mithören (getDisplayMedia fehlt).');
    }
    const s = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 1 }, audio, systemAudio: 'include'
    });
    if (s.getAudioTracks().length === 0) {
      s.getTracks().forEach(t => t.stop());
      throw new Error('Kein Audio geteilt. Beim Teilen unbedingt „Systemaudio teilen" '
                    + '(ganzer Bildschirm) bzw. „Tab-Audio teilen" ankreuzen.');
    }
    s.getVideoTracks().forEach(t => { t.enabled = false; });   // Video nicht gebraucht
    return s;
  }
  const constraints = { audio };
  if (elInput.value) constraints.audio.deviceId = { exact: elInput.value };
  return navigator.mediaDevices.getUserMedia(constraints);
}

// Audioblock-Callback (gemeinsam fuer Clock- und Noten-/Akkord-Modus). Als
// benannte Funktion ausgelagert, damit der Block (Latenz) zur Laufzeit getauscht
// werden kann, ohne die Sitzung neu zu starten.
function processAudioEvent(ev) {
  const noteMode = (opMode === 'mono' || opMode === 'poly' || opMode === 'chord');
  const ib = ev.inputBuffer;
  const chs = ib.numberOfChannels, n = ib.length;
  const mono = new Float32Array(n);
  for (let c = 0; c < chs; c++) {
    const d = ib.getChannelData(c);
    for (let i = 0; i < n; i++) mono[i] += d[i];
  }
  if (chs > 1) for (let i = 0; i < n; i++) mono[i] /= chs;
  if (noteMode) {
    if (!noteEngine) return;
    let sum = 0; for (let i = 0; i < n; i++) sum += mono[i] * mono[i];
    const rms = Math.sqrt(sum / n);
    levelEma = 0.85 * levelEma + 0.15 * rms;
    lastChunkTime = performance.now();
    noteEngine.push(mono);
    noteEngine.process(rms);
  } else {
    for (let off = 0; off + HOP_SIZE <= n; off += HOP_SIZE) onChunk(mono.subarray(off, off + HOP_SIZE));
  }
}

// Den Audioblock (Latenz) im laufenden Betrieb umschalten: neuen Prozessor mit
// der gewuenschten Blockgroesse einklinken und den alten sauber abhaengen.
function rebuildNoteProcessor() {
  if (!running || !audioCtx || !procSrc || !sinkNode) return;
  if (!(opMode === 'mono' || opMode === 'poly' || opMode === 'chord')) return;
  try {
    const np = audioCtx.createScriptProcessor(noteBlockSize, 1, 1);
    np.onaudioprocess = processAudioEvent;
    procSrc.connect(np);
    np.connect(sinkNode);
    if (procNode) { try { procNode.disconnect(); } catch (e) {} procNode.onaudioprocess = null; }
    procNode = np;
  } catch (e) {}
}

// --- Sitzung starten / stoppen ---
async function start() {
  if (opMode === 'file') return startFile();
  const minBpm = clampBpm(parseFloat(elMin.value), DEFAULT_MIN_BPM);
  const maxBpm = clampBpm(parseFloat(elMax.value), DEFAULT_MAX_BPM);
  if (!(minBpm < maxBpm)) { setHint('BPM-Bereich ungueltig: von < bis (z. B. 70 bis 140).', true); return; }

  const mode = elSource.value;          // 'input' | 'display'
  try {
    mediaStream = await acquireStream(mode);
  } catch (e) {
    setHint((mode === 'display' ? 'Mithören fehlgeschlagen: ' : 'Mikrofon-/Eingangszugriff fehlgeschlagen: ')
          + e.message, true);
    setStatus('FEHLER');
    return;
  }

  if (mode === 'input') {
    captureGranted(mediaStream);
    inputsUnlocked = true;
    refreshAudioInputs();
  }
  // Beendet der Nutzer das Teilen/die Freigabe im Browser, endet der Audio-
  // Track -> Sitzung sauber stoppen.
  const at0 = mediaStream.getAudioTracks()[0];
  if (at0) at0.addEventListener('ended', () => {
    if (running) { stop(); setHint('Mithören/Aufnahme beendet (Quelle gestoppt).'); }
  });

  const noteMode = opMode !== 'clock';
  try {
    audioCtx = new AudioContext();
    await audioCtx.resume();
    const sr = audioCtx.sampleRate;

    if (noteMode) {
      noteEngine = new NoteEngine(sr, opMode,
        (bytes) => { if (midiOut) { try { midiOut.send(bytes); } catch (e) {} } });
      noteTranspose = (parseInt(elOctave.value, 10) || 0) * 12;
      noteEngine.transpose = noteTranspose;
      applyCalibToEngine(noteEngine);     // kalibrierte Tracking-Parameter uebernehmen
    } else {
      analyzer = new TempoAnalyzer(sr, minBpm, maxBpm);
    }

    procSrc = audioCtx.createMediaStreamSource(mediaStream);
    // ScriptProcessorNode statt AudioWorklet: laedt kein Modul -> auch unter
    // file:// nutzbar. Im Noten-Modus bestimmt der Block die Latenz (kalibrierbar).
    const bufSize = noteMode ? noteBlockSize : 2048;
    procNode = audioCtx.createScriptProcessor(bufSize, 1, 1);
    procNode.onaudioprocess = processAudioEvent;
    procSrc.connect(procNode);
    // ScriptProcessor feuert nur, wenn er zum Ausgang verbunden ist.
    // Stumm geschalteter Gain -> kein Ton, keine Rueckkopplung.
    sinkNode = audioCtx.createGain();
    sinkNode.gain.value = 0;
    procNode.connect(sinkNode);
    sinkNode.connect(audioCtx.destination);
  } catch (e) {
    setHint('Audio konnte nicht gestartet werden: ' + e.message, true);
    setStatus('FEHLER');
    if (audioCtx) { try { await audioCtx.close(); } catch (_) {} audioCtx = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    procNode = null; sinkNode = null; analyzer = null; noteEngine = null;
    return;
  }

  estimates = []; lastRaw = 0; levelEma = 0; haveEstimate = false;
  resetKey();
  if (!noteMode) {
    clock.sendStartStop = elStartStop.checked;
    clock.enable();
    analyzeTimer = setInterval(analyze, ANALYSIS_INTERVAL * 1000);
  }
  lastChunkTime = performance.now();
  running = true;
  elStart.textContent = 'Stopp';
  elStart.classList.add('stop');
  setControlsDisabled(true);
  setHint(noteMode
    ? 'Läuft – erkannte Noten werden an den MIDI-Ausgang gesendet. Tab im Vordergrund lassen.'
    : 'Laeuft. Tab im Vordergrund lassen, damit die Clock stabil bleibt.');
}

function stop() {
  if (opMode === 'file') return stopFile();
  running = false;
  if (analyzeTimer) { clearInterval(analyzeTimer); analyzeTimer = null; }
  clock.disable();
  if (noteEngine) { noteEngine.allOff(); noteEngine = null; }
  if (procNode) { procNode.disconnect(); procNode.onaudioprocess = null; procNode = null; }
  if (procSrc) { try { procSrc.disconnect(); } catch (e) {} procSrc = null; }
  if (sinkNode) { sinkNode.disconnect(); sinkNode = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  analyzer = null; haveEstimate = false; estimates = [];
  resetKey();
  if (keyEnabled) updateKeyDisplay();
  elStart.textContent = 'Start';
  elStart.classList.remove('stop');
  setControlsDisabled(false);
  applySource();                      // Eingangsfelder je nach Quelle wieder richtig
  applyModeControls();                // BPM-/Tonart-Felder je nach Betriebsart
  setBpmText('—');
  elRaw.textContent = opMode === 'clock' ? 'roh: —' : '';
  setStatus('bereit');
  updateLevel(-60);
}

// ===========================================================================
// Datei-Modus: Datei laden -> OFFLINE Beat-Map -> driftfreie MIDI-Clock, die
// gegen die Web-Audio-Wiedergabe terminiert wird (kein freilaufender Timer ->
// kein Drift). Bei variablem Tempo folgt die Clock den gemessenen Beat-
// Abstaenden; bei konstantem Tempo wird ein mathematisch perfektes Raster
// erzeugt. Die Tick-Zeiten (Audio-Kontext) werden je Scheduler-Runde ueber
// audioCtx.getOutputTimestamp() in die performance.now()-Domaene umgerechnet
// und mit Timestamp an den MIDI-Port geschickt.
// ===========================================================================

function fileMinBpm() { return clampBpm(parseFloat(elMin.value), DEFAULT_MIN_BPM); }
function fileMaxBpm() { return clampBpm(parseFloat(elMax.value), DEFAULT_MAX_BPM); }

async function loadFile(file) {
  let arr;
  try { arr = await file.arrayBuffer(); }
  catch (e) { setHint('Datei konnte nicht gelesen werden: ' + e.message, true); setStatus('FEHLER'); return; }
  await decodeAndAnalyze(arr, (file && file.name) ? file.name : 'Datei');
}
// Gemeinsamer Weg fuer Datei UND Aufnahme: Rohdaten dekodieren -> Beat-Map.
async function decodeAndAnalyze(arr, name) {
  if (running) stop();
  resetFileMode();                       // alten Kontext/Buffer freigeben
  fileName = name;
  elFileNameLbl.textContent = name;
  elStart.disabled = true;
  setBpmText('—');
  setStatus('dekodiere …');
  setHint('Audio wird gelesen …');
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch (e) { setHint('Audio-Kontext fehlgeschlagen: ' + e.message, true); setStatus('FEHLER'); return; }
  await new Promise(r => setTimeout(r, 0));
  try {
    fileBuffer = await audioCtx.decodeAudioData(arr);
  } catch (e) {
    setHint('Audio konnte nicht dekodiert werden (Format nicht unterstützt?): ' + (e && e.message ? e.message : e), true);
    setStatus('FEHLER'); fileBuffer = null; return;
  }
  await analyzeLoadedFile();
}

// --- Aufnahme: Quelle bereitstellen -> manuell starten/stoppen ---
// Aufnehmen geht via Mithören (getDisplayMedia) ODER normalem Audio-Eingang
// (getUserMedia). Voraussetzung ist MediaRecorder + mindestens eine Quelle.

}

// Inhalt/Tab bereits gewaehlt ist. Danach wird manuell aufgenommen.
async function armRecording() {
  if (recording || running) return;
  disarmRecording();
  const mode = elSource.value;            // 'input' | 'display'
  let stream;
  try { stream = await acquireStream(mode); }
  catch (e) { setHint((mode === 'display' ? 'Mithören' : 'Eingang') + ' bereitstellen fehlgeschlagen: ' + e.message, true); return; }
  recArmedStream = stream;
  if (mode === 'input') { captureGranted(stream); inputsUnlocked = true; refreshAudioInputs(); }
  const at0 = stream.getAudioTracks()[0];
  if (at0) at0.addEventListener('ended', () => { recording ? stopRecording() : disarmRecording(true); });
  // alten Datei-/Aufnahme-Zustand verwerfen (ohne die neue Quelle zu stoppen)
  fileBuffer = null; fileBeatTimes = null; fileTickTimes = null; fileTempoInfo = null;
  recBlob = null; recSegments = []; elRecSave.disabled = true; closeSavePanel();
  startRecMonitor(stream);                // Live-Pegel/BPM/Tonart schon beim Bereitstellen
  elRecArm.classList.add('on'); elRecArm.textContent = 'Quelle bereit ✓';
  elRecToggle.disabled = false;

  setHint(mode === 'display'
    ? 'Quelle bereit (Mithören) – Inhalt/Tab ist gewählt. Pegel/BPM/Tonart laufen mit. „● Start" nimmt auf, „■ Stopp" beendet.'

}
function disarmRecording(endedByBrowser) {

  elRecArm.classList.remove('on'); elRecArm.textContent = 'Quelle bereitstellen';
  if (!recording) elRecToggle.disabled = true;
  if (endedByBrowser) setHint('Quelle wurde beendet. „Quelle bereitstellen" für eine neue Aufnahme.');
}
// Live-Analyse auf der bereitgestellten Quelle (gleiche Kette wie der Clock-Modus,

  catch (e) { return; }
  analyzer = new TempoAnalyzer(audioCtx.sampleRate, fileMinBpm(), fileMaxBpm());
  estimates = []; lastRaw = 0; levelEma = 0; haveEstimate = false; resetKey();
  try {
    procSrc = audioCtx.createMediaStreamSource(stream);
    procNode = audioCtx.createScriptProcessor(2048, 1, 1);
    procNode.onaudioprocess = processAudioEvent;   // opMode==='file' -> onChunk -> analyzer
    procSrc.connect(procNode);

function stopRecMonitor() {

  if (procNode) { try { procNode.disconnect(); } catch (e) {} procNode.onaudioprocess = null; procNode = null; }
  if (procSrc) { try { procSrc.disconnect(); } catch (e) {} procSrc = null; }
  if (sinkNode) { try { sinkNode.disconnect(); } catch (e) {} sinkNode = null; }
  if (audioCtx) { try { audioCtx.close(); } catch (e) {} audioCtx = null; }

}

  elMidi.disabled = true; elRecSave.disabled = true;

}

  elRecArm.disabled = false; elMode.disabled = false; elMidi.disabled = false;

}

  const blob = new Blob(recChunks, { type });

  catch (e) { setHint('Aufnahme konnte nicht gelesen werden: ' + e.message, true); setStatus('FEHLER'); return; }
  await decodeAndAnalyze(arr, 'Aufnahme · ' + fmtTime(secs));   // resetFileMode (loescht recBlob) + Beat-Map
  if (fileBuffer) {

function abortRecording() {        // bei Moduswechsel/Reset: Aufnahme verwerfen

    if (recRecorder) { try { recRecorder.onstop = null; recRecorder.ondataavailable = null; if (recRecorder.state !== 'inactive') recRecorder.stop(); } catch (e) {} recRecorder = null; }

// --- Tonart-Einmalschaetzung ueber einen Buffer-Ausschnitt (fuer Datei/Segment) ---
function estimateKey(chans, sr, s0, s1) {
  const N = 8192, half = N >> 1, len = s1 - s0;
  if (len < N) return null;
  const fft = new FFT(N), win = new Float32Array(N);
  for (let i = 0; i < N; i++) win[i] = 0.5 - 0.5 * Math.cos(2 * Math.PI * i / (N - 1));
  const binPc = new Int8Array(half), binBass = new Uint8Array(half);
  for (let k = 1; k < half; k++) {
    const f = k * sr / N;
    if (f < 55 || f > 2000) { binPc[k] = -1; continue; }
    binPc[k] = ((((Math.round(12 * Math.log2(f / 440) + 69)) % 12) + 12) % 12);
    binBass[k] = (f >= 55 && f <= 220) ? 1 : 0;
  }
  const re = new Float32Array(N), im = new Float32Array(N);
  const c = new Float32Array(12), bas = new Float32Array(12), nCh = chans.length;
  const hop = Math.max(N, Math.floor((len - N) / 150) || N);   // ~150 Frames ueber das Segment verteilt
  let frames = 0;
  for (let off = s0; off + N <= s1; off += hop) {
    for (let i = 0; i < N; i++) { let v = 0; for (let ch = 0; ch < nCh; ch++) v += chans[ch][off + i]; if (nCh > 1) v /= nCh; re[i] = v * win[i]; im[i] = 0; }
    fft.transform(re, im);
    for (let k = 1; k < half; k++) { const pc = binPc[k]; if (pc < 0) continue; const mag = Math.hypot(re[k], im[k]); c[pc] += mag; if (binBass[k]) bas[pc] += mag; }
    frames++;
  }
  if (!frames) return null;
  const pcp = chromaNorm(c), bass = chromaNorm(bas);
  return pcp ? classifyKey(pcp, bass || new Float32Array(12)) : null;
}
function keyFileName(name) { return (name || '').replace(/\s+/g, '_'); }
function suggestName(seg) {
  const parts = [];
  if (seg.bpm) parts.push(Math.round(seg.bpm) + 'BPM');
  if (seg.key) parts.push(keyFileName(seg.key));
  return parts.length ? parts.join('_') : 'Aufnahme';
}

// --- Segmentierung: mehrere Stuecke an Stille + BPM/Tonart-Wechsel erkennen ---
async function segBpm(buffer, s0, s1) {
  const sr = buffer.sampleRate, nCh = buffer.numberOfChannels, len = s1 - s0;
  if (len < sr * 2) return 0;
  const sub = audioCtx.createBuffer(nCh, len, sr);
  for (let c = 0; c < nCh; c++) sub.getChannelData(c).set(buffer.getChannelData(c).subarray(s0, s1));
  let res = null;
  try { res = await computeBeatMap(sub, fileMinBpm(), fileMaxBpm(), () => {}); } catch (e) {}
  return res ? res.bpm : 0;
}
function mergeShort(segs, minSamples) {
  let changed = true;
  while (changed && segs.length > 1) {
    changed = false;
    for (let k = 0; k < segs.length; k++) {
      if (segs[k].endS - segs[k].startS < minSamples) {
        if (k > 0) { segs[k - 1].endS = segs[k].endS; segs.splice(k, 1); }
        else { segs[k + 1].startS = segs[k].startS; segs.splice(k, 1); }
        changed = true; break;
      }
    }
  }
  return segs;
}
async function analyzeSegments(buffer, bounds) {
  const sr = buffer.sampleRate, nCh = buffer.numberOfChannels;
  const chans = []; for (let c = 0; c < nCh; c++) chans.push(buffer.getChannelData(c));
  const segs = [];
  for (let k = 0; k < bounds.length - 1; k++) {
    if (bounds[k + 1] - bounds[k] < sr) continue;
    const seg = { startS: bounds[k], endS: bounds[k + 1] };
    seg.bpm = await segBpm(buffer, seg.startS, seg.endS);
    const key = estimateKey(chans, sr, seg.startS, seg.endS);
    seg.key = key ? key.name : ''; seg.keyMargin = key ? key.margin : 0;
    segs.push(seg);
  }
  for (let k = 0; k < segs.length; k++) {
    if (k === 0) { segs[k].confident = true; }
    else {
      const a = segs[k - 1], b = segs[k];
      const bpmDiff = (a.bpm && b.bpm) ? Math.abs(a.bpm - b.bpm) / ((a.bpm + b.bpm) / 2) : 0;
      b.confident = (bpmDiff > 0.04) || (!!a.key && !!b.key && a.key !== b.key);
    }
    segs[k].name = suggestName(segs[k]);
  }
  return segs.length ? segs : [{ startS: 0, endS: buffer.length, bpm: 0, key: '', confident: true, name: 'Aufnahme' }];
}
async function segmentRecording(buffer) {
  const sr = buffer.sampleRate, N = buffer.length, nCh = buffer.numberOfChannels;
  const chans = []; for (let c = 0; c < nCh; c++) chans.push(buffer.getChannelData(c));
  const fr = 2048, nf = Math.floor(N / fr);
  const rms = new Float32Array(nf); let peak = 0;
  for (let i = 0; i < nf; i++) {
    let s = 0; const base = i * fr;
    for (let j = 0; j < fr; j++) { let v = 0; for (let c = 0; c < nCh; c++) v += chans[c][base + j]; if (nCh > 1) v /= nCh; s += v * v; }
    const r = Math.sqrt(s / fr); rms[i] = r; if (r > peak) peak = r;
  }
  const thr = Math.max(peak * 0.06, 1e-4);          // ~ -24 dB unter Peak = "still"
  const gapFrames = Math.ceil(SONG_GAP_S * sr / fr);
  const cuts = [];
  for (let i = 0; i < nf;) {
    if (rms[i] < thr) {
      let j = i; while (j < nf && rms[j] < thr) j++;
      if (j - i >= gapFrames) { const mid = Math.floor((i + j) / 2) * fr; if (mid > fr * 8 && mid < N - fr * 8) cuts.push(mid); }
      i = j;
    } else i++;
  }
  let segs = []; const bounds = [0, ...cuts, N];
  for (let k = 0; k < bounds.length - 1; k++) segs.push({ startS: bounds[k], endS: bounds[k + 1] });
  segs = mergeShort(segs, Math.floor(SONG_MIN_S * sr));
  return analyzeSegments(buffer, [0, ...segs.slice(1).map(s => s.startS), N]);
}

// --- Speichern (WAV-Slice / WebM-Original) mit freiem Namen + Vorschlag ---
function bufferSliceToWav(buffer, s0, s1) {
  const sr = buffer.sampleRate, nCh = Math.min(2, buffer.numberOfChannels), len = s1 - s0;
  const chans = []; for (let c = 0; c < nCh; c++) chans.push(buffer.getChannelData(c));
  const blockAlign = nCh * 2, dataLen = len * blockAlign;
  const ab = new ArrayBuffer(44 + dataLen), dv = new DataView(ab);
  const wr = (o, s) => { for (let i = 0; i < s.length; i++) dv.setUint8(o + i, s.charCodeAt(i)); };
  wr(0, 'RIFF'); dv.setUint32(4, 36 + dataLen, true); wr(8, 'WAVE'); wr(12, 'fmt ');
  dv.setUint32(16, 16, true); dv.setUint16(20, 1, true); dv.setUint16(22, nCh, true);
  dv.setUint32(24, sr, true); dv.setUint32(28, sr * blockAlign, true);
  dv.setUint16(32, blockAlign, true); dv.setUint16(34, 16, true); wr(36, 'data'); dv.setUint32(40, dataLen, true);
  let off = 44;
  for (let i = 0; i < len; i++) for (let c = 0; c < nCh; c++) {
    let v = chans[c][s0 + i]; v = v < -1 ? -1 : v > 1 ? 1 : v;
    dv.setInt16(off, v < 0 ? v * 32768 : v * 32767, true); off += 2;
  }
  return new Blob([ab], { type: 'audio/wav' });
}
async function saveBlob(blob, suggestedBase, ext, mime) {
  const fname = (suggestedBase || 'Aufnahme').replace(/[\\/:*?"<>|]+/g, '_') + '.' + ext;
  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({ suggestedName: fname, types: [{ description: ext.toUpperCase() + '-Audio', accept: { [mime]: ['.' + ext] } }] });
      const w = await handle.createWritable(); await w.write(blob); await w.close();
      return true;
    } catch (e) { if (e && e.name === 'AbortError') return false; }   // sonst: Fallback
  }
  const nm = window.prompt ? window.prompt('Dateiname:', fname) : fname;
  if (nm === null) return false;
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = nm || fname;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1500);
  return true;
}
async function saveSegmentWav(idx) {
  const seg = recSegments[idx];
  if (!seg || !fileBuffer) return;
  await saveBlob(bufferSliceToWav(fileBuffer, seg.startS, seg.endS), seg.name || suggestName(seg), 'wav', 'audio/wav');
}
async function saveWholeWebm() {
  if (!recBlob) { setHint('WebM-Original nur für Aufnahmen verfügbar.', true); return; }
  const base = (recSegments[0] && recSegments[0].name) || 'Aufnahme';
  await saveBlob(recBlob, base, 'webm', 'audio/webm');
}
