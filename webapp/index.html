// --- Offline-Analyse: Onset-Huellkurve -> globales Tempo -> lokale Tempokurve
//     -> DP-Beat-Tracking -> Beat-Zeiten; danach konstant/variabel entscheiden.
async function computeBeatMap(buffer, minBpm, maxBpm, onProgress) {
  const sr = buffer.sampleRate;
  const N = buffer.length;
  const ch = buffer.numberOfChannels;
  const chans = [];
  for (let c = 0; c < ch; c++) chans.push(buffer.getChannelData(c));
  const envRate = sr / HOP_SIZE;                 // Onset-Frames pro Sekunde
  const nHops = Math.max(1, Math.floor((N - 1) / HOP_SIZE) + 1);
  const fft = new FFT(FFT_SIZE);
  const win = new Float32Array(FFT_SIZE);
  for (let i = 0; i < FFT_SIZE; i++) win[i] = 0.5 - 0.5 * Math.cos(2 * Math.PI * i / (FFT_SIZE - 1));
  const re = new Float32Array(FFT_SIZE), im = new Float32Array(FFT_SIZE);
  const half = FFT_SIZE >> 1, halfWin = FFT_SIZE >> 1;
  const prevMag = new Float32Array(half);
  const onset = new Float32Array(nHops);
  let havePrev = false;
  const YIELD_EVERY = 300;
  // zentrierte Frames: Frame h ist um Sample h*HOP zentriert -> Beat-Zeit = h*HOP/sr
  for (let h = 0; h < nHops; h++) {
    const startS = h * HOP_SIZE - halfWin;
    for (let i = 0; i < FFT_SIZE; i++) {
      const s = startS + i;
      let v = 0;
      if (s >= 0 && s < N) { for (let c = 0; c < ch; c++) v += chans[c][s]; if (ch > 1) v /= ch; }
      re[i] = v * win[i]; im[i] = 0;
    }
    fft.transform(re, im);
    let flux = 0;
    for (let k = 0; k < half; k++) {
      const mag = Math.hypot(re[k], im[k]);
      const d = mag - prevMag[k];
      if (d > 0) flux += d;
      prevMag[k] = mag;
    }
    onset[h] = havePrev ? flux : 0;
    havePrev = true;
    if ((h % YIELD_EVERY) === 0) { if (onProgress) onProgress(0.7 * h / nHops); await new Promise(r => setTimeout(r, 0)); }
  }
  const centerBpm = Math.sqrt(minBpm * maxBpm);
  const tau0 = globalTempoLag(onset, envRate, minBpm, maxBpm, centerBpm);
  if (!tau0 || !isFinite(tau0)) return null;
  if (onProgress) onProgress(0.8); await new Promise(r => setTimeout(r, 0));
  const period = localPeriodCurve(onset, envRate, tau0, minBpm, maxBpm);
  if (onProgress) onProgress(0.9); await new Promise(r => setTimeout(r, 0));
  // lokaler Score = Onset / Standardabweichung (Onset-Schaerfe bleibt -> praezise Beats)
  let mean = 0; for (let i = 0; i < nHops; i++) mean += onset[i]; mean /= nHops;
  let vv = 0; for (let i = 0; i < nHops; i++) { const d = onset[i] - mean; vv += d * d; }
  const std = Math.sqrt(vv / Math.max(1, nHops - 1)) || 1;
  const local = new Float32Array(nHops);
  for (let i = 0; i < nHops; i++) local[i] = onset[i] / std;
  const beatFrames = dpBeats(local, period, FILE_TIGHTNESS);
  if (beatFrames.length < 2) return null;
  refineBeats(beatFrames, onset);                // auf naechstgelegene Onset-Spitze ziehen
  let beats = new Float64Array(beatFrames.length);
  for (let i = 0; i < beatFrames.length; i++) beats[i] = beatFrames[i] * HOP_SIZE / sr;
  beats = sanitizeBeats(beats);
  if (beats.length < 2) return null;
  // Konstantes vs. variables Tempo. Ein zum Klick aufgenommener Song laeuft
  // konstant -- auch wenn der Beat-Tracker einzelne Beats verschluckt oder
  // doppelt setzt. Dabei wandert die Beat-PHASE ueber den Song, weshalb ein
  // Geradenfit gegen den Beat-INDEX (t ~ a + b*k) hier untauglich ist: schon
  // ein ausgelassener Beat verschiebt alle folgenden Indizes und treibt die
  // Residuen auf >100 ms, obwohl das Tempo exakt konstant ist. Robust ist der
  // Vergleich des Median-Beat-Abstands der ERSTEN gegen die ZWEITE Haelfte:
  // echte Tempoaenderung verschiebt ihn, reines Erkennungs-Zittern nicht.
  const ibis = [];
  for (let i = 1; i < beats.length; i++) { const d = beats[i] - beats[i - 1]; if (d > 0) ibis.push(d); }
  if (ibis.length < 2) return null;
  const sorted = ibis.slice().sort((a, b) => a - b);
  const q = (p) => sorted[Math.min(sorted.length - 1, Math.max(0, Math.round(p * (sorted.length - 1))))];
  const medIvl = q(0.5);                       // robuste Beat-Periode (gegen Aussetzer/Doppler)
  const midBeat = beats.length >> 1;
  const medHalf = (lo, hi) => { const w = []; for (let i = lo + 1; i < hi; i++) { const d = beats[i] - beats[i - 1]; if (d > 0) w.push(d); } if (!w.length) return 0; w.sort((a, b) => a - b); return w[w.length >> 1]; };
  const mh1 = medHalf(0, midBeat), mh2 = medHalf(midBeat, beats.length);
  const drift = (mh1 > 0 && mh2 > 0) ? Math.abs(mh2 - mh1) / (0.5 * (mh1 + mh2)) : 1;
  if (onProgress) onProgress(1.0);
  if (medIvl > 0 && drift < FILE_CONST_DRIFT) {
    // Periode praezise bestimmen: der Median-Beat-Abstand ist ein robuster, aber
    // nur ~0,1%-genauer Startwert (genug fuer 10 ms, aber bei langen Files ein
    // paar 100 ms Drift). Per Phasenfaltung eng um den Median wird er ueber die
    // volle Songlaenge verfeinert -- aber nur, wenn die Beats global phasen-
    // kohaerent sind (R >= FILE_FOLD_MIN_R); sonst koennte die Faltung auf eine
    // leicht falsche Periode einrasten. Die enge Suche (+-FILE_FOLD_REL) haelt
    // selbst eine verworfene Faltung dicht am robusten Median.
    const fold = foldPeriod(beats, medIvl, FILE_FOLD_REL);
    const P = (fold.R >= FILE_FOLD_MIN_R) ? fold.P : medIvl;
    const ph = gridPhase(beats, P);            // bester globaler Anker (zirkulaeres Mittel)
    const dur = buffer.duration;
    const arr = [];
    let k = Math.ceil((0 - ph) / P - 1e-9);
    for (; ; k++) { const t = ph + P * k; if (t > dur) break; if (t >= 0) arr.push(t); }
    if (arr.length >= 2) {
      const bpm = 60 / P;
      return { beats: Float64Array.from(arr), constant: true, bpm: bpm, bpmMin: bpm, bpmMax: bpm };
    }
  }
  // variabel: robuste Kennzahlen (Median + 10/90-Perzentile) -> einzelne
  // Ausreisser-Beats verfaelschen die Anzeige nicht.
  return { beats, constant: false, bpm: 60 / medIvl, bpmMin: 60 / q(0.9), bpmMax: 60 / q(0.1) };
}

// Globales Tempo per Autokorrelation der Onset-Huellkurve (Harmonienkamm + Prior).
function globalTempoLag(onset, envRate, minBpm, maxBpm, centerBpm) {
  const L = onset.length;
  if (L < envRate * 2) return null;
  let mean = 0; for (let i = 0; i < L; i++) mean += onset[i]; mean /= L;
  const x = new Float32Array(L); let energy = 0;
  for (let i = 0; i < L; i++) { x[i] = onset[i] - mean; energy += x[i] * x[i]; }
  if (energy <= 0) return null;
  const lagMin = Math.max(2, Math.floor(60 * envRate / maxBpm));
  const lagMax = Math.min(L - 2, Math.ceil(60 * envRate / minBpm));
  if (lagMax <= lagMin) return null;
  const acfMax = Math.min(L - 2, lagMax * 4);
  const acf = new Float32Array(acfMax + 1);
  for (let lag = lagMin; lag <= acfMax; lag++) {
    let s = 0; const lim = L - lag;
    for (let i = 0; i < lim; i++) s += x[i] * x[i + lag];
    acf[lag] = s / energy;
  }
  const harmW = [1.0, 0.6, 0.4, 0.25];
  let best = -Infinity, bestLag = -1;
  for (let lag = lagMin; lag <= lagMax; lag++) {
    let comb = 0;
    for (let hh = 1; hh <= 4; hh++) { const hl = lag * hh; if (hl <= acfMax) comb += harmW[hh - 1] * acf[hl]; }
    const bpm = 60 * envRate / lag;
    const lo = Math.log2(bpm / centerBpm) / TEMPO_PRIOR_OCT;
    const prior = Math.exp(-0.5 * lo * lo);
    const score = comb * prior;
    if (score > best) { best = score; bestLag = lag; }
  }
  if (bestLag < 0) return null;
  let lag = bestLag;
  if (bestLag > lagMin && bestLag < lagMax) {
    const y0 = acf[bestLag - 1], y1 = acf[bestLag], y2 = acf[bestLag + 1];
    const den = (y0 - 2 * y1 + y2);
    if (den !== 0) { const d = 0.5 * (y0 - y2) / den; if (d > -1 && d < 1) lag = bestLag + d; }
  }
  return lag;
}

// Zeitlich variable Periodenkurve (Frames/Beat), oktav-fest um tau0 herum.
function localPeriodCurve(onset, envRate, tau0, minBpm, maxBpm) {
  const L = onset.length;
  const winLen = Math.max(Math.round(6 * envRate), Math.round(5 * tau0));
  const hop = Math.max(1, Math.round(0.5 * envRate));
  let lagLo = Math.max(2, Math.round(tau0 * 0.7));
  let lagHi = Math.round(tau0 * 1.45);
  lagLo = Math.max(lagLo, Math.floor(60 * envRate / maxBpm));
  lagHi = Math.min(lagHi, Math.ceil(60 * envRate / minBpm));
  if (lagHi <= lagLo) { const p = new Float32Array(L); p.fill(tau0); return p; }
  const knotX = [], knotLag = [];
  const halfW = winLen >> 1;
  for (let c = 0; c < L; c += hop) {
    const s = Math.max(0, c - halfW), e = Math.min(L, c + halfW), n = e - s;
    if (n <= lagHi + 2) { knotX.push(c); knotLag.push(tau0); continue; }
    let mean = 0; for (let i = s; i < e; i++) mean += onset[i]; mean /= n;
    let energy = 0; for (let i = s; i < e; i++) { const v = onset[i] - mean; energy += v * v; }
    let bestLag = tau0, best = -Infinity;
    if (energy > 0) {
      for (let lag = lagLo; lag <= lagHi; lag++) {
        let acc = 0; const lim = e - lag;
        for (let i = s; i < lim; i++) acc += (onset[i] - mean) * (onset[i + lag] - mean);
        const sc = acc / energy;
        const lo = Math.log2(lag / tau0);
        const pr = Math.exp(-0.5 * (lo / 0.35) * (lo / 0.35));   // sanfter Prior auf tau0
        const score = sc * pr;
        if (score > best) { best = score; bestLag = lag; }
      }
    }
    knotX.push(c); knotLag.push(bestLag);
  }
  // glaetten (gleitender Mittelwert ueber 3 Knoten)
  const sm = knotLag.slice();
  for (let i = 0; i < sm.length; i++) {
    let a = 0, cnt = 0;
    for (let j = -1; j <= 1; j++) { const k = i + j; if (k >= 0 && k < knotLag.length) { a += knotLag[k]; cnt++; } }
    sm[i] = a / cnt;
  }
  const period = new Float32Array(L);
  if (knotX.length === 1) { period.fill(sm[0]); return period; }
  let ki = 0;
  for (let i = 0; i < L; i++) {
    while (ki < knotX.length - 2 && knotX[ki + 1] <= i) ki++;
    if (i <= knotX[0]) period[i] = sm[0];
    else if (i >= knotX[knotX.length - 1]) period[i] = sm[sm.length - 1];
    else {
      const x0 = knotX[ki], x1 = knotX[ki + 1];
      const f = x1 > x0 ? (i - x0) / (x1 - x0) : 0;
      period[i] = sm[ki] + (sm[ki + 1] - sm[ki]) * f;
    }
  }
  return period;
}

// Dynamische Programmierung (Ellis): beste Beat-Folge bei lokal erwarteter Periode.
function dpBeats(local, period, tightness) {
  const L = local.length;
  const cum = new Float64Array(L);
  const back = new Int32Array(L); back.fill(-1);
  for (let i = 0; i < L; i++) {
    const P = period[i] > 1 ? period[i] : 1;
    const lo = Math.max(1, Math.round(P * 0.5));
    const hi = Math.round(P * 2.0);
    let bestScore = -Infinity, bestJ = -1;
    const jStart = i - hi, jEnd = i - lo;
    for (let j = jStart; j <= jEnd; j++) {
      if (j < 0) continue;
      const r = Math.log((i - j) / P);
      const sc = cum[j] - tightness * r * r;
      if (sc > bestScore) { bestScore = sc; bestJ = j; }
    }
    if (bestJ < 0) { cum[i] = local[i]; back[i] = -1; }
    else { cum[i] = local[i] + bestScore; back[i] = bestJ; }
  }
  const Plast = period[L - 1] > 1 ? period[L - 1] : 1;
  const tailStart = Math.max(0, L - Math.round(Plast));
  let bestEnd = -1, bestVal = -Infinity;
  for (let i = tailStart; i < L; i++) { if (cum[i] > bestVal) { bestVal = cum[i]; bestEnd = i; } }
  if (bestEnd < 0) return [];
  const beats = [];
  let i = bestEnd;
  while (i >= 0) { beats.push(i); i = back[i]; }
  beats.reverse();
  return beats;
}

// Beats auf die naechste Onset-Spitze ziehen und sub-Frame-genau interpolieren
// (parabolisch). Das reduziert die Frame-Quantisierung (~11 ms) deutlich und
// verbessert sowohl die Konstanterkennung als auch die absolute Synchronitaet.
function refineBeats(beats, onset) {
  const L = onset.length, r = 2;
  for (let n = 0; n < beats.length; n++) {
    const b = beats[n] | 0;
    let bestI = b, bestV = (b >= 0 && b < L) ? onset[b] : -Infinity;
    for (let j = -r; j <= r; j++) { const k = b + j; if (k >= 0 && k < L && onset[k] > bestV) { bestV = onset[k]; bestI = k; } }
    let frac = 0;
    if (bestI > 0 && bestI < L - 1) {
      const y0 = onset[bestI - 1], y1 = onset[bestI], y2 = onset[bestI + 1];
      const den = (y0 - 2 * y1 + y2);
      if (den !== 0) { const d = 0.5 * (y0 - y2) / den; if (d > -1 && d < 1) frac = d; }
    }
    beats[n] = bestI + frac;
  }
}

function sanitizeBeats(beats) {
  const out = [];
  for (let i = 0; i < beats.length; i++) {
    const t = beats[i];
    if (!isFinite(t)) continue;
    if (out.length === 0 || t > out[out.length - 1] + 1e-4) out.push(t);
  }
  return Float64Array.from(out);
}

// Phasenfaltung: feine Periodensuche eng um P0 (Sekunden). Faltet alle Beats
// auf ihre Phase (Beat modulo P) und sucht die Periode mit der staerksten
// Buendelung (Laenge der Resultierenden R, 0..1). Unempfindlich gegen
// ausgelassene/doppelte Beats -- ein fehlender Beat liegt weiter bei Phase 0,
// ein Doppler ist ein einzelner Ausreisser. Liefert Periode P und Kohaerenz R.
function foldPeriod(beats, P0, rel) {
  const coh = (P) => {
    let sc = 0, ss = 0;
    for (let i = 0; i < beats.length; i++) { const a = 2 * Math.PI * beats[i] / P; sc += Math.cos(a); ss += Math.sin(a); }
    return Math.hypot(sc, ss) / beats.length;
  };
  let lo = P0 * (1 - rel), hi = P0 * (1 + rel), bestP = P0, bestR = -1;
  for (let pass = 0; pass < 3; pass++) {          // grob -> fein um das Maximum
    const steps = 400; let lp = bestP, lr = -1;
    for (let s = 0; s <= steps; s++) { const P = lo + (hi - lo) * s / steps; const R = coh(P); if (R > lr) { lr = R; lp = P; } }
    bestP = lp; bestR = lr; const span = (hi - lo) / steps * 4; lo = bestP - span; hi = bestP + span;
  }
  return { P: bestP, R: bestR };
}

// Zirkulaeres Mittel der Beat-Phasen modulo P -> bester globaler Anker (s) in
// [0, P). Robust gegen Ausreisser, weil als Vektormittel gerechnet.
function gridPhase(beats, P) {
  let sc = 0, ss = 0;
  for (let i = 0; i < beats.length; i++) { const a = 2 * Math.PI * beats[i] / P; sc += Math.cos(a); ss += Math.sin(a); }
  let ph = (Math.atan2(ss, sc) / (2 * Math.PI)) * P;
  ph %= P; if (ph < 0) ph += P;
  return ph;
}

// 24 PPQN. Wichtig: 24 Ticks gelten PRO Viertel. Ist ein Beat-Abstand ~doppelt
// so lang wie seine Nachbarn (vom Tracker uebersprungener Beat), bekommt er
// 48 Ticks (mult=2) -> die Clock-Geschwindigkeit bleibt durchgehend korrekt und
// phasenrichtig statt kurz auf Halbtempo zu fallen. Ueber den letzten Beat hinaus
// wird mit dem letzten Intervall bis Dateiende verlaengert.
function buildTickTimes(beats, duration) {
  const M = beats.length;
  if (M < 2) return new Float64Array(0);
  const ibi = [];
  for (let k = 1; k < M; k++) ibi.push(beats[k] - beats[k - 1]);
  const localMed = (k) => {
    const w = [];
    for (let j = Math.max(0, k - 2); j <= Math.min(ibi.length - 1, k + 2); j++) w.push(ibi[j]);
    w.sort((a, b) => a - b);
    return w[w.length >> 1];
  };
  const ticks = [];
  for (let k = 0; k < M - 1; k++) {
    const t0 = beats[k], d = beats[k + 1] - beats[k];
    const med = localMed(k) || d;
    let mult = Math.round(d / med); if (mult < 1) mult = 1; if (mult > 4) mult = 4;
    const sub = PPQN * mult;
    for (let j = 0; j < sub; j++) ticks.push(t0 + d * (j / sub));
  }
  const lastIvl = beats[M - 1] - beats[M - 2];
  if (lastIvl > 0) {
    let t = beats[M - 1];
    while (t <= duration + 1e-6) {
      for (let j = 0; j < PPQN; j++) { const tt = t + lastIvl * (j / PPQN); if (tt <= duration + 1e-6) ticks.push(tt); }
      t += lastIvl;
    }
  } else {
    ticks.push(beats[M - 1]);
  }
  return Float64Array.from(ticks);
}

// Momentantempo an Position pos (s) aus dem Beat-Raster.
function fileBpmAt(pos) {
  const b = fileBeatTimes;
  if (!b || b.length < 2) return fileTempoInfo ? fileTempoInfo.bpm : 0;
  if (pos <= b[0]) { const d = b[1] - b[0]; return d > 0 ? 60 / d : 0; }
  if (pos >= b[b.length - 1]) { const d = b[b.length - 1] - b[b.length - 2]; return d > 0 ? 60 / d : 0; }
  let lo = 0, hi = b.length - 1;
  while (hi - lo > 1) { const mid = (lo + hi) >> 1; if (b[mid] <= pos) lo = mid; else hi = mid; }
  const d = b[lo + 1] - b[lo];
  return d > 0 ? 60 / d : 0;
}

function fmtTime(s) {
  s = Math.max(0, s);
  const m = Math.floor(s / 60), ss = Math.floor(s % 60);
  return m + ':' + (ss < 10 ? '0' : '') + ss;
}

// --- Wiedergabe + driftfreier Scheduler ---
async function startFile() {
  if (fileAnalyzing) { setHint('Bitte die Analyse abwarten …'); return; }
  if (!fileBuffer || !fileTickTimes || !fileTickTimes.length) { setHint('Bitte zuerst eine Audiodatei wählen.', true); return; }
  if (!audioCtx) { setHint('Audio-Kontext fehlt – Datei bitte neu laden.', true); return; }
  clock.disable();                       // sicherstellen: keine Live-Clock parallel
  try { await audioCtx.resume(); } catch (e) {}
  try {
    fileSource = audioCtx.createBufferSource();
    fileSource.buffer = fileBuffer;
    fileAnalyser = audioCtx.createAnalyser();
    fileAnalyser.fftSize = 1024;
    fileTimeBuf = new Float32Array(fileAnalyser.fftSize);
    fileSource.connect(fileAnalyser);
    fileSource.connect(audioCtx.destination);   // hoerbar
  } catch (e) {
    setHint('Wiedergabe-Setup fehlgeschlagen: ' + e.message, true);
    if (fileSource) { try { fileSource.disconnect(); } catch (_) {} fileSource = null; }
    return;
  }
  fileNextTickIdx = 0; fileStartSent = false; levelEma = 0;
  const t0 = audioCtx.currentTime + FILE_LEAD_S;
  fileStartCtxTime = t0;
  fileSource.onended = () => { if (running) finishFile(); };
  try { fileSource.start(t0); } catch (e) { setHint('Start fehlgeschlagen: ' + e.message, true); return; }
  running = true;
  fileSchedTimer = setInterval(fileScheduleTick, FILE_SCHED_INTERVAL_MS);
  elStart.textContent = 'Stopp'; elStart.classList.add('stop');
  setControlsDisabled(true);
  if (elFileBtn) elFileBtn.disabled = true;
  if (elRecArm) elRecArm.disabled = true;
  if (elRecToggle) elRecToggle.disabled = true;
  if (elRecSave) elRecSave.disabled = true;
  closeSavePanel();
  elMidi.disabled = true;
  setStatus('spielt …');
  setHint('Spielt driftfrei. Die MIDI-Clock ist an die Wiedergabe gekoppelt. Tab im Vordergrund lassen.');
}

function fileScheduleTick() {
  if (!running || !fileSource || !fileTickTimes) return;
  let ctxNow, perfNow;
  const ots = (audioCtx && audioCtx.getOutputTimestamp) ? audioCtx.getOutputTimestamp() : null;
  if (ots && typeof ots.contextTime === 'number' && typeof ots.performanceTime === 'number' && ots.contextTime > 0) {
    ctxNow = ots.contextTime; perfNow = ots.performanceTime;
  } else {
    ctxNow = audioCtx ? audioCtx.currentTime : 0; perfNow = performance.now();
  }
  const pos = ctxNow - fileStartCtxTime;               // hoerbare Wiedergabeposition (s)
  const horizon = pos + FILE_SCHED_LOOKAHEAD_S;
  const sendSS = elStartStop.checked;
  while (fileNextTickIdx < fileTickTimes.length && fileTickTimes[fileNextTickIdx] < horizon) {
    const tSec = fileTickTimes[fileNextTickIdx];
    const tcTarget = fileStartCtxTime + tSec;          // Ziel in Audio-Kontextzeit
    let perfTarget = perfNow + (tcTarget - ctxNow) * 1000;   // -> performance.now()-Domaene
    if (perfTarget < perfNow) perfTarget = perfNow;
    if (!fileStartSent) {
      fileStartSent = true;
      if (sendSS && midiOut) { try { midiOut.send([MSG_START], Math.max(perfNow, perfTarget - 1)); } catch (e) {} }
    }
    if (midiOut) { try { midiOut.send([MSG_CLOCK], perfTarget); } catch (e) {} }
    fileNextTickIdx++;
  }
}

function renderFile() {
  if (fileAnalyser && fileTimeBuf) {
    fileAnalyser.getFloatTimeDomainData(fileTimeBuf);
    let s = 0; for (let i = 0; i < fileTimeBuf.length; i++) s += fileTimeBuf[i] * fileTimeBuf[i];
    const rms = Math.sqrt(s / fileTimeBuf.length);
    levelEma = 0.8 * levelEma + 0.2 * rms;
    updateLevel(levelEma > 0 ? 20 * Math.log10(levelEma) : -120);
  }
  const ctxNow = audioCtx ? audioCtx.currentTime : 0;
  const pos = ctxNow - fileStartCtxTime;
  const dur = fileBuffer ? fileBuffer.duration : 0;
  const bpm = fileBpmAt(pos);
  setBpmText(bpm ? String(Math.round(bpm)) : '—');
  elRaw.textContent = dur ? (fmtTime(pos) + ' / ' + fmtTime(dur)) : '';
  if (fileTempoInfo && fileTempoInfo.constant) setStatus('spielt · konstantes Tempo · driftfrei');
  else setStatus('spielt · variables Tempo · driftfrei');
}

function teardownFilePlayback(sendStop) {
  if (fileSchedTimer) { clearInterval(fileSchedTimer); fileSchedTimer = null; }
  if (sendStop && fileStartSent && elStartStop.checked && midiOut) { try { midiOut.send([MSG_STOP]); } catch (e) {} }
  if (fileSource) { try { fileSource.onended = null; fileSource.stop(); } catch (e) {} try { fileSource.disconnect(); } catch (e) {} fileSource = null; }
  if (fileAnalyser) { try { fileAnalyser.disconnect(); } catch (e) {} fileAnalyser = null; }
  fileTimeBuf = null;
  running = false; fileStartSent = false;
  elStart.textContent = 'Abspielen & senden'; elStart.classList.remove('stop');
  setControlsDisabled(false);
  if (elFileBtn) elFileBtn.disabled = false;
  if (elRecArm) elRecArm.disabled = !recAnySupported();
  if (elRecToggle) elRecToggle.disabled = !recArmedStream;
  if (elRecSave) elRecSave.disabled = !(recBlob && fileBuffer);
  elMidi.disabled = false;
  updateLevel(-60);
  applyModeControls();
}

function stopFile() {
  teardownFilePlayback(true);
  setBpmText(fileTempoInfo ? String(Math.round(fileTempoInfo.bpm)) : '—');
  if (fileTempoInfo) {
    if (fileTempoInfo.constant) setStatus('bereit · konstantes Tempo ≈ ' + fileTempoInfo.bpm.toFixed(1) + ' BPM · perfektes Raster');
    else setStatus('bereit · variables Tempo ' + Math.round(fileTempoInfo.bpmMin) + '–' + Math.round(fileTempoInfo.bpmMax) + ' BPM');
  } else setStatus('bereit');
  setHint('Gestoppt. „Abspielen & senden" für erneuten Start.');
}

function finishFile() {
  teardownFilePlayback(true);
  setBpmText(fileTempoInfo ? String(Math.round(fileTempoInfo.bpm)) : '—');
  setStatus('fertig');
  if (fileBuffer) elRaw.textContent = fmtTime(fileBuffer.duration) + ' / ' + fmtTime(fileBuffer.duration);
  setHint('Wiedergabe beendet. „Abspielen & senden" für erneuten Start.');
}

// Datei-Modus vollstaendig zuruecksetzen (Kontext schliessen, Zustand leeren).
function resetFileMode() {
  abortRecording();                      // laufende Aufnahme verwerfen
  recBlob = null; recSegments = [];      // alte Aufnahme/Segmente verwerfen
  if (elRecSave) elRecSave.disabled = true;
  closeSavePanel();
  if (fileSchedTimer) { clearInterval(fileSchedTimer); fileSchedTimer = null; }
  if (fileSource) { try { fileSource.onended = null; fileSource.stop(); } catch (e) {} try { fileSource.disconnect(); } catch (e) {} fileSource = null; }
  if (fileAnalyser) { try { fileAnalyser.disconnect(); } catch (e) {} fileAnalyser = null; }
  fileTimeBuf = null;
  if (audioCtx) { try { audioCtx.close(); } catch (e) {} audioCtx = null; }
  fileBuffer = null; fileBeatTimes = null; fileTickTimes = null; fileTempoInfo = null;
  fileNextTickIdx = 0; fileStartSent = false;
  if (running && opMode === 'file') running = false;
  if (elFileNameLbl) elFileNameLbl.textContent = 'keine Datei';
}

// --- Audio-Bloecke + Analyse ---
function onChunk(chunk) {
  if (!analyzer) return;
  lastChunkTime = performance.now();
  analyzer.pushChunk(chunk);
  let sum = 0;
  for (let i = 0; i < chunk.length; i++) sum += chunk[i] * chunk[i];
  const rms = Math.sqrt(sum / chunk.length);
  levelEma = 0.85 * levelEma + 0.15 * rms;
}
function analyze() {
  if (!analyzer) return;
  const db = levelEma > 0 ? 20 * Math.log10(levelEma) : -120;
  if (db < SILENCE_DB) {
    estimates = []; haveEstimate = false; clock.setTargetBpm(null);
    resetKey();
    return;
  }
  const est = analyzer.estimate();
  if (est) {
    lastRaw = est.bpm;
    estimates.push(est.bpm);
    if (estimates.length > BPM_MEDIAN_LEN) estimates.splice(0, estimates.length - BPM_MEDIAN_LEN);
    haveEstimate = true;
    const med = median(estimates);
    clock.setTargetBpm(med);
    // Beat-Phasenkopplung (optional, gegen Drift): die Clock laeuft im aus den
    // Beats gemessenen Song-Tempo und wird auf das erkannte Beat-Raster nachge-
    // zogen. Das Raster kommt aus einer Phasenfaltung der Onset-Huellkurve eng
    // ums Tempo -- nur bei hoher Kohaerenz einrasten, sonst frei weiterlaufen
    // (kein Reissen bei undeutlichem Beat).
    if (beatSyncEnabled) {
      const grid = analyzer.beatGrid(med);
      if (grid && grid.coherence >= BEAT_MIN_COH) {
        clock.setBeat(lastChunkTime - grid.offSec * 1000, grid.periodSec * 1000);
      }
    }
  }
  // Tonart-Chroma (grosse FFT) nur rechnen, wenn die Anzeige aktiv ist -- spart
  // spuerbar Rechenzeit (v. a. auf dem Handy), wenn die Tonart nicht gebraucht wird.
  // Bei der Aufnahme wird sie immer mitgerechnet (Anzeige gewuenscht).
  if (keyEnabled || recMonitoring) updateKey();
}

// --- Tonart: Chroma -> 50% schnelle EMA + 50% Gesamtmittel -> Klassifikation
//     mit Hysterese (wie im Python-Kern). Laeuft immer mit (guenstig); die
//     Anzeige erscheint nur, wenn der Tonart-Button aktiv ist.
function resetKey() {
  keyDisp = '—'; keyPend = null; keyPendN = 0; keyConfident = false;
  emaPcp = emaBass = cumPcp = cumBass = null; cumN = 0;
  if (analyzer) { analyzer.cbuf.fill(0); analyzer.cbufFilled = 0; }
}
function updateKey() {
  const ch = analyzer.computeChroma();
  if (!ch) return;
  const p = ch.pcp, b = ch.bass;
  if (emaPcp === null) {
    emaPcp = p.slice(); emaBass = b.slice();
    cumPcp = p.slice(); cumBass = b.slice(); cumN = 1;
  } else {
    for (let i = 0; i < 12; i++) {
      emaPcp[i]  = (1 - KEY_EMA_A) * emaPcp[i]  + KEY_EMA_A * p[i];
      emaBass[i] = (1 - KEY_EMA_A) * emaBass[i] + KEY_EMA_A * b[i];
      cumPcp[i] += p[i]; cumBass[i] += b[i];
    }
    cumN++;
  }
  const prof = new Float32Array(12), bprof = new Float32Array(12);
  for (let i = 0; i < 12; i++) {
    prof[i]  = 0.5 * emaPcp[i]  + 0.5 * (cumPcp[i]  / cumN);
    bprof[i] = 0.5 * emaBass[i] + 0.5 * (cumBass[i] / cumN);
  }
  const r = classifyKey(prof, bprof);
  const cand = r.name;
  // Hysterese: Wechsel erst nach KEY_SWITCH_CONFIRM gleichen Folgeschaetzungen.
  if (cand !== keyDisp) {
    if (keyDisp === '—' || cand === '—') { keyDisp = cand; keyPend = null; keyPendN = 0; }
    else if (cand === keyPend) {
      keyPendN++;
      if (keyPendN >= KEY_SWITCH_CONFIRM) { keyDisp = cand; keyPend = null; keyPendN = 0; }
    } else { keyPend = cand; keyPendN = 1; }
  } else { keyPend = null; keyPendN = 0; }
  keyConfident = (cand === keyDisp && cand !== '—'
                  && r.margin >= KEY_CONFIDENT_MARGIN && cumN >= KEY_CONFIDENT_MIN_N);
}
function updateKeyDisplay() {
  const show = (running || recMonitoring) && keyDisp !== '—';
  elKeyName.textContent = show ? keyDisp : '—';
  const par = show ? parallelKey(keyDisp) : '';
  elKeyPar.textContent = par ? '(' + par + ')' : '';
  // Gedimmt, solange die Erkennung noch unsicher ist (wie im Python-Kern).
  elKeyName.classList.toggle('idle', !(show && keyConfident));
}

// --- Anzeige ---
function render() {
  if (recMonitoring) {
    // Bereitstellen/Aufnahme: Pegel + BPM + Tonart live anzeigen (Status setzt
    // der Aufnahme-Timer bzw. das Bereitstellen, daher hier nicht ueberschreiben).
    const db = levelEma > 0 ? 20 * Math.log10(levelEma) : -120;
    updateLevel(db);
    if (performance.now() - lastChunkTime > 1500 || db < SILENCE_DB || !haveEstimate) setBpmText('—');
    else setBpmText(String(Math.round(median(estimates))));
    elKeyBlock.style.display = (keyDisp !== '—') ? '' : 'none';
    updateKeyDisplay();
    requestAnimationFrame(render);
    return;
  }
  if (running && opMode === 'file') {
    renderFile();
  } else if (running) {
    const db = levelEma > 0 ? 20 * Math.log10(levelEma) : -120;
    updateLevel(db);
    if (opMode !== 'clock') {
      // Noten-Modus: aktuell gesendete Note(n) anzeigen
      if (performance.now() - lastChunkTime > 1500) setStatus('KEIN AUDIO – Eingang prüfen');
      else setStatus(opMode === 'chord' ? 'Akkord-Modus' : opMode === 'poly' ? 'Noten-Modus (polyphon)' : 'Noten-Modus (monophon)');
      const disp = noteEngine ? noteEngine.display : '—';
      elBpm.textContent = disp;
      elBpm.classList.toggle('idle', disp === '—');
      elRaw.textContent = '';
    } else if (performance.now() - lastChunkTime > 1500) {
      setStatus('KEIN AUDIO – Eingang prüfen'); setBpmText('—');
    } else if (db < SILENCE_DB) {
      setStatus('KEIN SIGNAL'); setBpmText('—');
    } else if (!haveEstimate) {
      setStatus('analysiere …'); setBpmText('—');
    } else {
      setStatus('laeuft'); setBpmText(String(Math.round(median(estimates))));
      elRaw.textContent = 'roh: ' + (lastRaw ? lastRaw.toFixed(1) : '—');
    }
  }
  if (keyEnabled && opMode !== 'file') updateKeyDisplay();
  requestAnimationFrame(render);
}

// --- Hilfen ---
function median(arr) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a, b) => a - b);
  const m = s.length >> 1;
  return s.length % 2 ? s[m] : 0.5 * (s[m - 1] + s[m]);
}
function clampBpm(v, fallback) { return isFinite(v) ? Math.min(300, Math.max(30, v)) : fallback; }
function setStatus(txt) { elStatus.textContent = txt; }
function setBpmText(txt) { elBpm.textContent = txt; elBpm.classList.toggle('idle', txt === '—'); }
function setHint(txt, isError) { elHint.textContent = txt; elHint.classList.toggle('error', !!isError); }
function updateLevel(db) {
  const pct = Math.max(0, Math.min(100, (db + 60) / 60 * 100));
  elBar.style.width = pct + '%';
  elDb.textContent = (db <= -60 ? '-60' : db.toFixed(0)) + ' dB';
}
function setControlsDisabled(on) {
  elMode.disabled = on; elSource.disabled = on; elInput.disabled = on; elLoad.disabled = on;
  elMin.disabled = on; elMax.disabled = on;
}

// --- Verdrahtung ---
elStart.addEventListener('click', () => running ? stop() : start());
elMidi.addEventListener('change', applyMidiOutput);
elLoad.addEventListener('click', () => { inputsUnlocked = false; unlockInputs(); });
elInput.addEventListener('focus', () => { if (!inputsUnlocked) unlockInputs(); });
elMidi.addEventListener('focus', initMidi);
elSource.addEventListener('change', applySource);
elMode.addEventListener('change', applyMode);
elStartStop.addEventListener('change', () => { clock.sendStartStop = elStartStop.checked; });
elBeatSync.addEventListener('change', () => {
  beatSyncEnabled = elBeatSync.checked;
  if (!beatSyncEnabled) clock.clearBeat();   // sofort frei laufen lassen
});
elOctave.addEventListener('change', () => {
  const oct = Math.max(-4, Math.min(4, parseInt(elOctave.value, 10) || 0));
  elOctave.value = oct;
  noteTranspose = oct * 12;
  if (noteEngine) noteEngine.setTranspose(noteTranspose);   // offene Noten sauber umsetzen
});
elKeyToggle.addEventListener('click', () => {
  keyEnabled = !keyEnabled;
  elKeyBlock.style.display = keyEnabled ? '' : 'none';
  elKeyToggle.textContent = keyEnabled ? 'ausblenden' : 'anzeigen';
  elKeyToggle.classList.toggle('on', keyEnabled);
  if (keyEnabled) updateKeyDisplay();
});

// Kalibrierung: Panel ein-/ausblenden, Slider live anwenden, zuruecksetzen.
elCalibToggle.addEventListener('click', () => {
  calibVisible = !calibVisible;
  elCalibToggle.textContent = calibVisible ? 'ausblenden' : 'anzeigen';
  elCalibToggle.classList.toggle('on', calibVisible);
  updateCalibPanel();
});
[cSil, cSus, cOff, cYin, cChg].forEach(el => el.addEventListener('input', () => {
  syncCalibLabels();
  if (running && noteEngine) applyCalibToEngine(noteEngine);
}));
cLat.addEventListener('input', () => {        // Latenz: Audioblock live umschalten
  syncCalibLabels();
  if (running) rebuildNoteProcessor();
});
elCalibReset.addEventListener('click', () => {
  loadCalibDefaults(opMode);
  if (running && noteEngine) applyCalibToEngine(noteEngine);
  if (running) rebuildNoteProcessor();
});

// Datei-Modus: Datei waehlen + bei BPM-Bereichsaenderung neu analysieren
elFileBtn.addEventListener('click', () => elAudioFile.click());
elAudioFile.addEventListener('change', (e) => {
  const f = e.target.files && e.target.files[0];
  e.target.value = '';                 // gleiche Datei erneut waehlbar machen
  if (f) loadFile(f);
});
elRecArm.addEventListener('click', armRecording);
elRecToggle.addEventListener('click', () => recording ? stopRecording() : startRecording());
elRecSave.addEventListener('click', openSavePanel);
elSaveAll.addEventListener('click', async () => {
  if (elFmtWebm.checked) { await saveWholeWebm(); return; }
  for (let i = 0; i < recSegments.length; i++) await saveSegmentWav(i);
});
elMergeAll.addEventListener('click', async () => {
  if (!fileBuffer) return;
  setStatus('analysiere …'); await new Promise(r => setTimeout(r, 0));
  recSegments = [await makeWholeSegment()];
  renderSegList(); setStatus('ein Stück');
});
elSplitTime.addEventListener('click', splitByTime);
elSaveClose.addEventListener('click', closeSavePanel);
[elFmtWav, elFmtWebm].forEach(el => el.addEventListener('change', () => { renderSegList(); updateSaveNote(); }));
function maybeReanalyze() {
  if (opMode === 'file' && fileBuffer && !running && !fileAnalyzing) analyzeLoadedFile();
}
elMin.addEventListener('change', maybeReanalyze);
elMax.addEventListener('change', maybeReanalyze);

window.addEventListener('DOMContentLoaded', () => {
  elMidi.add(new Option('Kein MIDI (Liste öffnen zum Verbinden)', ''));
  // "Wiedergabe mithören" braucht getDisplayMedia -- auf Android/Mobil-Chrome
  // nicht vorhanden. Dann die Option sichtbar deaktivieren statt erst beim
  // Start zu scheitern.
  if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
    const opt = [...elSource.options].find(o => o.value === 'display');
    if (opt) { opt.disabled = true; opt.textContent += ' – hier nicht verfügbar'; }
    if (elSource.value === 'display') { elSource.value = 'input'; applySource(); }
  }
  if (!recAnySupported()) { elRecArm.disabled = true; elRecArm.title = 'Aufnahme hier nicht verfügbar'; }
  refreshAudioInputs();
  syncCalibLabels();        // Kalibrier-Slider-Beschriftungen initialisieren
  setBpmText('—');
  updateLevel(-60);
  setStatus('bereit');
  if (!window.isSecureContext) {
    setHint('Hinweis: Ohne sicheren Kontext (lokale Datei, http://localhost oder HTTPS) können Mikrofon/MIDI gesperrt sein.', true);
  } else {
    setHint('„Eingänge laden“ klicken, um alle Audio-Eingänge mit Namen zu sehen. MIDI-Liste öffnen, um den MIDI-Ausgang zu wählen.');
  }
  requestAnimationFrame(render);
});
</script>
</body>
